<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>管理登入 - emfont</title>
		<link rel="icon" type="image/svg+xml" href="/assets/img/logo/favicon.svg" />
		<link rel="stylesheet" href="/assets/admin-font-upload.css" />
	</head>
	<body>
		<main class="admin-shell login-shell">
			<header>
				<a href="/" aria-label="回到首頁">
					<img src="/assets/img/logo/emfont-logo-light.svg" alt="emfont" />
				</a>
				<div>
					<p>管理者工具</p>
					<h1>登入</h1>
				</div>
			</header>

			<section class="workspace" aria-label="管理者登入">
				<form id="admin-login-form" class="login-form">
					<label>
						<span>使用者 ID</span>
						<input name="userId" autocomplete="username" required />
					</label>
					<label>
						<span>密碼</span>
						<input
							name="password"
							type="password"
							autocomplete="current-password"
							required
						/>
					</label>
					<div class="actions">
						<button type="submit">登入</button>
						<p id="login-status" role="status" aria-live="polite"></p>
					</div>
				</form>
			</section>
		</main>
		<script src="/assets/admin-login.js"></script>
	</body>
</html>
