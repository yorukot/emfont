<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>新增字型 - emfont 管理</title>
		<link rel="icon" type="image/svg+xml" href="/assets/img/logo/favicon.svg" />
		<link rel="stylesheet" href="/assets/admin-font-upload.css" />
	</head>
	<body>
		<main class="admin-shell">
			<header>
				<a href="/" aria-label="回到首頁">
					<img src="/assets/img/logo/emfont-logo-light.svg" alt="emfont" />
				</a>
				<div>
					<p>管理者工具</p>
					<h1>新增字型</h1>
				</div>
				<nav class="admin-nav" aria-label="管理頁面">
					<a href="/admin/fonts/edit">編輯字型資訊</a>
					<button id="admin-logout" class="link-button" type="button">
						登出
					</button>
				</nav>
			</header>

			<section class="workspace" aria-label="新增字型表單">
				<form id="font-upload-form">
					<div class="form-grid">
						<label>
							<span>字型 ID</span>
							<input
								name="id"
								required
								pattern="[A-Za-z0-9_-]+"
								placeholder="jfOpenHuninn"
							/>
						</label>
						<label>
							<span>字重</span>
							<input
								name="weight"
								required
								type="number"
								min="1"
								max="1000"
								value="400"
							/>
						</label>
						<label>
							<span>分類</span>
							<select name="category" required>
								<option value="sans-serif">sans-serif</option>
								<option value="serif">serif</option>
								<option value="monospace">monospace</option>
								<option value="cursive">cursive</option>
								<option value="fantasy">fantasy</option>
							</select>
						</label>
						<label>
							<span>通用名稱</span>
							<input name="name" required placeholder="open 粉圓" />
						</label>
						<label>
							<span>中文名稱</span>
							<input name="nameZh" placeholder="open 粉圓" />
						</label>
						<label>
							<span>英文名稱</span>
							<input name="nameEn" placeholder="jf open Huninn" />
						</label>
						<label>
							<span>家族</span>
							<input name="family" placeholder="圓體" />
						</label>
						<label>
							<span>標籤</span>
							<input name="tags" placeholder="圓體, 可愛" />
						</label>
						<label>
							<span>作者</span>
							<input name="authors" placeholder="justfont" />
						</label>
						<label>
							<span>授權</span>
							<input name="license" placeholder="SIL Open Font License 1.1" />
						</label>
						<label>
							<span>版本</span>
							<input name="version" placeholder="v1.0" />
						</label>
						<label class="wide">
							<span>來源網址</span>
							<input
								name="repoUrl"
								type="url"
								placeholder="https://github.com/..."
							/>
						</label>
						<label class="wide">
							<span>描述</span>
							<textarea name="description" rows="4"></textarea>
						</label>
						<label class="wide file-drop">
							<span>原始字型檔</span>
							<input
								name="fontFile"
								type="file"
								accept=".ttf,.otf,font/ttf,font/otf"
								required
							/>
						</label>
					</div>

					<div class="actions">
						<button type="submit">上傳並切割</button>
						<p id="upload-status" role="status" aria-live="polite">尚未上傳</p>
					</div>
				</form>
			</section>
		</main>
		<script src="/assets/admin-font-upload.js"></script>
	</body>
</html>
