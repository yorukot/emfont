                    | {
                        vulnerability_id: .VulnerabilityID,
                        target: $result.Target,
                        class: ($result.Class // ""),
                        type: ($result.Type // ""),
                        package: .PkgName,
                        installed_version: .InstalledVersion,
                        fixed_version: (.FixedVersion // ""),
                        status: (.Status // ""),
                        severity: .Severity
                      }
                  ] | unique_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]) | sort_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]))
                }
              ' "$report" >"$output"
            jq --exit-status '
              .schema == "emfont.trivy-high-critical/v1" and
              (.component | type == "string" and length > 0) and
              (.platform == "linux/amd64" or .platform == "linux/arm64") and
              (.image | type == "string" and
                test("^ghcr\\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$")) and
              (.findings | type == "array" and all(
                (.vulnerability_id | type == "string" and length > 0) and
                (.target | type == "string" and length > 0) and
                (.class | type == "string") and
                (.type | type == "string") and
                (.package | type == "string" and length > 0) and
                (.installed_version | type == "string" and length > 0) and
                (.fixed_version | type == "string") and
                (.status | type == "string") and
                (.severity == "HIGH" or .severity == "CRITICAL")
              ))
            ' "$output" >/dev/null
          }

          gate=0
          identity_rows="$RUNNER_TEMP/trivy-arm64-identity.tsv"
          install -m 0600 /dev/null "$identity_rows"
          for image_spec in \
            "$BACKEND_REF|backend" \
            "$POSTGRES_REF|postgres" \
            "$MINIO_REF|minio-server" \
            "$MINIO_MC_REF|minio-mc"
          do
            IFS='|' read -r reference slug <<<"$image_spec"
            configure_trivy_pull_auth "$reference"
            "${trivy[@]}" image \
              --image-src remote \
              --platform linux/arm64 \
              --skip-db-update \
              --exit-code 0 --scanners vuln \
              --format json --output "/reports/${slug}-full.json" "$reference"
            rm --force "$pull_config_file"
            validate_scan_report "$report_dir/${slug}-full.json" "$reference"
            normalized="$report_dir/${slug}-high-critical.normalized.json"
            normalize_high_critical_report \
              "$report_dir/${slug}-full.json" "$reference" "$slug" \
              linux/arm64 "$normalized"
            jq --sort-keys '
              .findings = [.findings[] | select(.fixed_version != "")]
            ' "$normalized" >"$report_dir/${slug}-fixable-high-critical.json"
            if jq --exit-status '.findings | length > 0' \
              "$report_dir/${slug}-fixable-high-critical.json" >/dev/null; then
              gate=1
            fi
            normalized_sha256="sha256:$(sha256sum "$normalized" | awk '{print $1}')"
            printf '%s\t%s\t%s\n' \
              "$slug" "$reference" "$normalized_sha256" >>"$identity_rows"
          done

          identity_file="$report_dir/scan-identity.json"
          jq --raw-input --slurp --sort-keys \
            --arg schema 'emfont.trivy-scan-identity/v1' \
            --arg platform linux/arm64 '
              {
                schema: $schema,
                platform: $platform,
                images: ([
                  split("\n")[]
                  | select(length > 0)
                  | split("\t")
                  | {
                      component: .[0],
                      image: .[1],
                      report_sha256: .[2]
                    }
                ] | sort_by(.component))
              }
            ' "$identity_rows" >"$identity_file"
          jq --exit-status '
            .schema == "emfont.trivy-scan-identity/v1" and
            .platform == "linux/arm64" and
            ([.images[].component] ==
              ["backend", "minio-mc", "minio-server", "postgres"]) and
            (.images | all(
              (.image | test("^ghcr\\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$")) and
              (.report_sha256 | test("^sha256:[0-9a-f]{64}$"))
            ))
          ' "$identity_file" >/dev/null
          identity_sha256="sha256:$(sha256sum "$identity_file" | awk '{print $1}')"

          scan_finished_epoch="$(date --utc +%s)"
          scan_finished_at="$(date --utc --date="@$scan_finished_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          ((scan_finished_epoch >= scan_started_epoch))
          ((scan_finished_epoch - scan_started_epoch <= 3600))
          evidence_file="$report_dir/scan-evidence.json"
          jq --null-input --sort-keys \
            --arg schema 'emfont.trivy-scan-evidence/v1' \
            --arg platform linux/arm64 \
            --arg scanner_image "$TRIVY_IMAGE" \
            --arg scanner_version "$TRIVY_VERSION" \
            --arg db_sha256 "$db_sha256" \
            --arg db_updated_at "$(jq --raw-output \
              '.VulnerabilityDB.UpdatedAt' "$report_dir/trivy-version.json")" \
            --arg db_downloaded_at "$(jq --raw-output \
              '.VulnerabilityDB.DownloadedAt' "$report_dir/trivy-version.json")" \
            --arg scan_started_at "$scan_started_at" \
            --arg scan_finished_at "$scan_finished_at" \
            --arg identity_sha256 "$identity_sha256" \
            --slurpfile identity "$identity_file" '
              {
                schema: $schema,
                platform: $platform,
                scanner_image: $scanner_image,
                scanner_version: $scanner_version,
                database_sha256: $db_sha256,
                database_updated_at: $db_updated_at,
                database_downloaded_at: $db_downloaded_at,
                scan_started_at: $scan_started_at,
                scan_finished_at: $scan_finished_at,
                identity_sha256: $identity_sha256,
                identity: $identity[0]
              }
            ' >"$evidence_file"
          evidence_sha256="sha256:$(sha256sum "$evidence_file" | awk '{print $1}')"
          {
            printf 'scanner_image=%s\n' "$TRIVY_IMAGE"
            printf 'scanner_version=%s\n' "$TRIVY_VERSION"
            printf 'image_source=remote\n'
            printf 'platform=linux/arm64\n'
            printf 'database_sha256=%s\n' "$db_sha256"
            printf 'database_updated_at=%s\n' \
              "$(jq --raw-output '.VulnerabilityDB.UpdatedAt' \
                "$report_dir/trivy-version.json")"
            printf 'scan_started_at=%s\n' "$scan_started_at"
            printf 'scan_finished_at=%s\n' "$scan_finished_at"
            printf 'identity_sha256=%s\n' "$identity_sha256"
            printf 'evidence_sha256=%s\n' "$evidence_sha256"
          } >"$report_dir/scan-metadata.env"
          {
            printf 'identity_sha256=%s\n' "$identity_sha256"
            printf 'evidence_sha256=%s\n' "$evidence_sha256"
            printf 'scan_finished_epoch=%s\n' "$scan_finished_epoch"
          } >>"$GITHUB_OUTPUT"
          exit "$gate"

      - name: Record arm64 gate approval
        id: gate
        run: printf 'approved=true\n' >>"$GITHUB_OUTPUT"

      - name: Upload exact arm64 security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-release-security-arm64-${{ needs.publish.outputs.version }}-${{ github.run_attempt }}
          path: trivy-release-reports-arm64/
          if-no-files-found: warn
          retention-days: 90

  sign-approved:
    name: Sign gate-approved exact digests
    needs:
      - publish
      - verify-published
      - verify-published-arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      signatures-verified: ${{ steps.signatures.outputs.verified }}
      negative-fixtures-verified: ${{ steps.signatures.outputs.negative_fixtures_verified }}
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      BACKEND_REF: ${{ needs.publish.outputs.backend-ref }}
      POSTGRES_REF: ${{ needs.publish.outputs.postgres-ref }}
      MINIO_REF: ${{ needs.publish.outputs.minio-ref }}
      MINIO_MC_REF: ${{ needs.publish.outputs.minio-mc-ref }}
      AMD64_GATE_APPROVED: ${{ needs.verify-published.outputs.gate-approved }}
      ARM64_GATE_APPROVED: ${{ needs.verify-published-arm64.outputs.gate-approved }}
      REPRODUCIBILITY_VERIFIED: ${{ needs.verify-published.outputs.reproducibility-verified }}
      CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/backend-release.yml@${{ github.ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign and immediately verify gate-approved digests
        id: signatures
        run: |
          set -euo pipefail
          [[ "$AMD64_GATE_APPROVED" == true ]]
          [[ "$ARM64_GATE_APPROVED" == true ]]
          [[ "$REPRODUCIBILITY_VERIFIED" == true ]]
          for reference in \
            "$BACKEND_REF" \
            "$POSTGRES_REF" \
            "$MINIO_REF" \
            "$MINIO_MC_REF"
          do
            cosign sign --yes "$reference"
            cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-github-workflow-name "$GITHUB_WORKFLOW" \
              --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
              --certificate-github-workflow-ref "$GITHUB_REF" \
              --certificate-github-workflow-sha "$GITHUB_SHA" \
              --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME" \
              "$reference" >/dev/null
          done

          expect_cosign_rejected() {
            local fixture="$1"
            shift
            if cosign verify "$@" >/dev/null 2>&1; then
              printf 'cosign negative fixture was accepted: %s\n' \
                "$fixture" >&2
              return 1
            fi
          }

          readonly impossible_sha=0000000000000000000000000000000000000000
          readonly impossible_ref=refs/heads/__emfont_negative_fixture__
          readonly impossible_identity="https://github.com/$GITHUB_REPOSITORY/.github/workflows/__emfont_negative_fixture__.yml@$GITHUB_REF"
          expect_cosign_rejected wrong-workflow-sha \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-sha "$impossible_sha" \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-workflow-ref \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-ref "$impossible_ref" \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-certificate-identity \
            --certificate-identity "$impossible_identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-oidc-issuer \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://example.invalid \
            "$BACKEND_REF"
          {
            printf 'verified=true\n'
            printf 'negative_fixtures_verified=true\n'
          } >>"$GITHUB_OUTPUT"

  promote:
    name: Promote verified release tags
    needs:
      - publish
      - verify-published
      - verify-published-arm64
      - sign-approved
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment:
      name: backend-production
    permissions:
      actions: read
      attestations: read
      contents: read
      deployments: read
      packages: write
    env:
      BACKEND_REF: ${{ needs.publish.outputs.backend-ref }}
      POSTGRES_REF: ${{ needs.publish.outputs.postgres-ref }}
      MINIO_REF: ${{ needs.publish.outputs.minio-ref }}
      MINIO_MC_REF: ${{ needs.publish.outputs.minio-mc-ref }}
      VERSION: ${{ needs.publish.outputs.version }}
      AMD64_GATE_APPROVED: ${{ needs.verify-published.outputs.gate-approved }}
      ARM64_GATE_APPROVED: ${{ needs.verify-published-arm64.outputs.gate-approved }}
      BUILDKIT_SBOM_VERIFIED: ${{ needs.verify-published.outputs.buildkit-sbom-verified }}
      BUILDKIT_PROVENANCE_VERIFIED: ${{ needs.verify-published.outputs.buildkit-provenance-verified }}
      GITHUB_PROVENANCE_VERIFIED: ${{ needs.verify-published.outputs.github-provenance-verified }}
      REPRODUCIBILITY_VERIFIED: ${{ needs.verify-published.outputs.reproducibility-verified }}
      SIGNATURES_VERIFIED: ${{ needs.sign-approved.outputs.signatures-verified }}
      COSIGN_NEGATIVE_FIXTURES_VERIFIED: ${{ needs.sign-approved.outputs.negative-fixtures-verified }}
      SOURCE_CI_RUN: ${{ needs.publish.outputs.source-ci-run }}
      SOURCE_CI_RUN_ATTEMPT: ${{ needs.publish.outputs.source-ci-run-attempt }}
      SOURCE_CI_WORKFLOW_REF: ${{ needs.publish.outputs.source-ci-workflow-ref }}
      SOURCE_CI_WORKFLOW_SHA: ${{ needs.publish.outputs.source-ci-workflow-sha }}
      PREAPPROVAL_AMD64_IDENTITY_SHA256: ${{ needs.verify-published.outputs.trivy-scan-identity-sha256 }}
      PREAPPROVAL_AMD64_EVIDENCE_SHA256: ${{ needs.verify-published.outputs.trivy-scan-evidence-sha256 }}
      PREAPPROVAL_AMD64_FINISHED_EPOCH: ${{ needs.verify-published.outputs.trivy-scan-finished-epoch }}
      PREAPPROVAL_ARM64_IDENTITY_SHA256: ${{ needs.verify-published-arm64.outputs.trivy-scan-identity-sha256 }}
      PREAPPROVAL_ARM64_EVIDENCE_SHA256: ${{ needs.verify-published-arm64.outputs.trivy-scan-evidence-sha256 }}
      PREAPPROVAL_ARM64_FINISHED_EPOCH: ${{ needs.verify-published-arm64.outputs.trivy-scan-finished-epoch }}
      CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/backend-release.yml@${{ github.ref }}
    steps:
      - name: Check out approved source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install checksum-authenticated Buildx and pinned BuildKit
        id: buildx
        run: |
          bash backend/scripts/workflow-setup-buildx.sh \
            "emfont-release-promote-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Reverify authenticated release tooling after approval
        env:
          PUBLISH_BUILDX_VERSION: ${{ needs.publish.outputs.buildx-version }}
          PUBLISH_BUILDX_BINARY_SHA256: ${{ needs.publish.outputs.buildx-binary-sha256 }}
          PUBLISH_BUILDX_HOST_PLATFORM: ${{ needs.publish.outputs.buildx-host-platform }}
          PUBLISH_BUILDKIT_IMAGE: ${{ needs.publish.outputs.buildkit-image }}
          APPROVED_BUILDX_VERSION: ${{ steps.buildx.outputs.version }}
          APPROVED_BUILDX_BINARY_SHA256: ${{ steps.buildx.outputs.binary_sha256 }}
          APPROVED_BUILDX_HOST_PLATFORM: ${{ steps.buildx.outputs.architecture }}
          APPROVED_BUILDKIT_IMAGE: ${{ steps.buildx.outputs.buildkit_image }}
        run: |
          set -euo pipefail
          test "$APPROVED_BUILDX_VERSION" = "$PUBLISH_BUILDX_VERSION"
          test "$APPROVED_BUILDX_BINARY_SHA256" = \
            "$PUBLISH_BUILDX_BINARY_SHA256"
          test "$APPROVED_BUILDX_HOST_PLATFORM" = "$PUBLISH_BUILDX_HOST_PLATFORM"
          test "$APPROVED_BUILDKIT_IMAGE" = "$PUBLISH_BUILDKIT_IMAGE"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Reverify signatures, attestations, and referrers after approval
        id: reverify
        env:
          GH_TOKEN: ${{ github.token }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          readonly provenance_type='https://slsa.dev/provenance/v1'
          readonly referrers_accept='application/vnd.oci.image.index.v1+json'
          readonly artifact_accept='application/vnd.oci.image.manifest.v1+json, application/vnd.oci.artifact.manifest.v1+json'
          auth_file="$RUNNER_TEMP/ghcr-reverification-auth.netrc"
          registry_config="$RUNNER_TEMP/ghcr-reverification-bearer.conf"
          work_dir="$RUNNER_TEMP/ghcr-reverification"
          install -d -m 0700 "$work_dir"
          umask 077
          install -m 0600 /dev/null "$auth_file"
          printf 'machine ghcr.io login %s password %s\n' \
            "$GITHUB_ACTOR" "$GHCR_TOKEN" >"$auth_file"

          cleanup_reverification() {
            rm --force "$auth_file" "$registry_config"
            rm --recursive --force "$work_dir"
          }
          trap cleanup_reverification EXIT

          configure_registry_auth() {
            local repository_path="$1"
            local registry_token
            registry_token="$(
              curl --fail-with-body --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --netrc-file "$auth_file" \
                --get \
                --data-urlencode 'service=ghcr.io' \
                --data-urlencode "scope=repository:${repository_path}:pull" \
                https://ghcr.io/token | \
              jq --exit-status --raw-output '.token // .access_token'
            )"
            [[ "$registry_token" =~ ^[A-Za-z0-9._~+/=-]+$ ]]
            install -m 0600 /dev/null "$registry_config"
            printf 'header = "Authorization: Bearer %s"\n' \
              "$registry_token" >"$registry_config"
            unset registry_token
          }

          registry_get() {
            local repository_path="$1"
            local object_path="$2"
            local accept="$3"
            local output="$4"
            curl --fail-with-body --silent --show-error --location \
              --proto '=https' \
              --proto-redir '=https' \
              --tlsv1.2 \
              --config "$registry_config" \
              --header "Accept: $accept" \
              --max-filesize 16777216 \
              --output "$output" \
              "https://ghcr.io/v2/${repository_path}/${object_path}"
          }

          verify_descriptor() {
            local file="$1"
            local digest="$2"
            local size="$3"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$size" =~ ^[1-9][0-9]*$ ]]
            [[ "$(stat --format '%s' "$file")" == "$size" ]]
            [[ "sha256:$(sha256sum "$file" | awk '{print $1}')" == "$digest" ]]
          }

          [[ "$AMD64_GATE_APPROVED" == true ]]
          [[ "$ARM64_GATE_APPROVED" == true ]]
          [[ "$BUILDKIT_SBOM_VERIFIED" == true ]]
          [[ "$BUILDKIT_PROVENANCE_VERIFIED" == true ]]
          [[ "$GITHUB_PROVENANCE_VERIFIED" == true ]]
          [[ "$REPRODUCIBILITY_VERIFIED" == true ]]
          [[ "$SIGNATURES_VERIFIED" == true ]]
          [[ "$COSIGN_NEGATIVE_FIXTURES_VERIFIED" == true ]]
          for image_spec in \
            "$BACKEND_REF|backend" \
            "$POSTGRES_REF|postgres" \
            "$MINIO_REF|minio" \
            "$MINIO_MC_REF|minio-mc"
          do
            IFS='|' read -r reference slug <<<"$image_spec"
            [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
            cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-github-workflow-name "$GITHUB_WORKFLOW" \
              --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
              --certificate-github-workflow-ref "$GITHUB_REF" \
              --certificate-github-workflow-sha "$GITHUB_SHA" \
              --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME" \
              "$reference" >"$work_dir/$slug-cosign.json"
            gh attestation verify "oci://$reference" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/backend-release.yml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --predicate-type "$provenance_type" \
              --deny-self-hosted-runners \
              >"$work_dir/$slug-github-attestation.txt"

            repository_path="${reference#ghcr.io/}"
            repository_path="${repository_path%@*}"
            subject_digest="${reference##*@}"
            configure_registry_auth "$repository_path"
            referrers="$work_dir/$slug-referrers.json"
            registry_get "$repository_path" "referrers/$subject_digest" \
              "$referrers_accept" "$referrers"
            jq --exit-status '
              .schemaVersion == 2 and
              (.manifests | type == "array" and length > 0) and
              (.manifests | all(
                (.mediaType | type == "string" and length > 0) and
                (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                (.size | type == "number" and . > 0 and floor == .)
              )) and
              ((.manifests | map(.digest) | unique | length) ==
               (.manifests | length))
            ' "$referrers" >/dev/null

            github_referrers=0
            while IFS=$'\t' read -r referrer_digest referrer_size; do
              referrer_manifest="$work_dir/$slug-${referrer_digest#sha256:}.json"
              registry_get "$repository_path" \
                "manifests/$referrer_digest" "$artifact_accept" \
                "$referrer_manifest"
              verify_descriptor \
                "$referrer_manifest" "$referrer_digest" "$referrer_size"
              if jq --exit-status \
                --arg subject_digest "$subject_digest" \
                --arg provenance_type "$provenance_type" '
                .subject.digest == $subject_digest and
                (.artifactType | type == "string" and
                  startswith("application/vnd.dev.sigstore.bundle")) and
                .annotations["dev.sigstore.bundle.content"] ==
                  "dsse-envelope" and
                .annotations["dev.sigstore.bundle.predicateType"] ==
                  $provenance_type
              ' "$referrer_manifest" >/dev/null; then
                ((github_referrers += 1))
              fi
            done < <(jq --exit-status --raw-output '
              .manifests[] | [.digest, (.size | tostring)] | @tsv
            ' "$referrers")
            ((github_referrers > 0))
          done

          expect_cosign_rejected() {
            local fixture="$1"
            shift
            if cosign verify "$@" >/dev/null 2>&1; then
              printf 'post-approval cosign negative fixture was accepted: %s\n' \
                "$fixture" >&2
              return 1
            fi
          }

          readonly impossible_sha=0000000000000000000000000000000000000000
          readonly impossible_ref=refs/heads/__emfont_negative_fixture__
          readonly impossible_identity="https://github.com/$GITHUB_REPOSITORY/.github/workflows/__emfont_negative_fixture__.yml@$GITHUB_REF"
          expect_cosign_rejected wrong-workflow-sha \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-sha "$impossible_sha" \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-workflow-ref \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-ref "$impossible_ref" \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-certificate-identity \
            --certificate-identity "$impossible_identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$BACKEND_REF"
          expect_cosign_rejected wrong-oidc-issuer \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer https://example.invalid \
            "$BACKEND_REF"
          {
            printf 'verified=true\n'
            printf 'negative_fixtures_verified=true\n'
          } >>"$GITHUB_OUTPUT"

      - name: Rescan exact digests and validate external CVE acceptances
        id: post_trivy
        env:
          GH_TOKEN: ${{ github.token }}
          CVE_ACCEPTANCE_B64: ${{ vars.EMFONT_CVE_ACCEPTANCE_B64 }}
        run: |
          set -euo pipefail
          readonly db_max_age_seconds=86400
          readonly scan_max_age_seconds=1800
          readonly acceptance_max_seconds=2592000
          readonly acceptance_max_encoded_bytes=65536
          readonly acceptance_max_decoded_bytes=49152
          readonly acceptance_max_controls=8
          readonly acceptance_max_control_chars=500
          readonly acceptance_max_ticket_chars=256
          preapproval_dir="$RUNNER_TEMP/preapproval-trivy-reports"
          report_dir="$RUNNER_TEMP/postapproval-trivy-reports"
          cache_dir="$RUNNER_TEMP/trivy-cache-postapproval"
          pull_auth_file="$RUNNER_TEMP/trivy-postapproval-pull-source.netrc"
          pull_config_dir="$RUNNER_TEMP/trivy-postapproval-pull-config"
          pull_config_file="$pull_config_dir/config.json"
          [[ ! -e "$pull_config_dir" ]]
          install -d -m 0700 \
            "$preapproval_dir/amd64" \
            "$preapproval_dir/arm64" \
            "$report_dir" \
            "$cache_dir" \
            "$pull_config_dir"
          umask 077
          install -m 0600 /dev/null "$pull_auth_file"
          printf 'machine ghcr.io login %s password %s\n' \
            "$GITHUB_ACTOR" "$GH_TOKEN" >"$pull_auth_file"
          printf '{"auths":{}}\n' >"$pull_config_file"

          # Invoked by the EXIT trap.
          # shellcheck disable=SC2317
          cleanup_trivy_pull_auth() {
            rm --force "$pull_auth_file"
            rm --recursive --force "$pull_config_dir"
          }
          trap cleanup_trivy_pull_auth EXIT

          for digest in \
            "$PREAPPROVAL_AMD64_IDENTITY_SHA256" \
            "$PREAPPROVAL_AMD64_EVIDENCE_SHA256" \
            "$PREAPPROVAL_ARM64_IDENTITY_SHA256" \
            "$PREAPPROVAL_ARM64_EVIDENCE_SHA256"
          do
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          done
          [[ "$PREAPPROVAL_AMD64_FINISHED_EPOCH" =~ ^[1-9][0-9]*$ ]]
          [[ "$PREAPPROVAL_ARM64_FINISHED_EPOCH" =~ ^[1-9][0-9]*$ ]]

          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "backend-release-security-$VERSION-$GITHUB_RUN_ATTEMPT" \
            --dir "$preapproval_dir/amd64"
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "backend-release-security-arm64-$VERSION-$GITHUB_RUN_ATTEMPT" \
            --dir "$preapproval_dir/arm64"

          validate_scan_identity() {
            local identity_file="$1"
            local platform="$2"
            jq --exit-status \
              --arg platform "$platform" \
              --arg backend "$BACKEND_REF" \
              --arg postgres "$POSTGRES_REF" \
              --arg minio "$MINIO_REF" \
              --arg minio_mc "$MINIO_MC_REF" '
                .schema == "emfont.trivy-scan-identity/v1" and
                .platform == $platform and
                ([.images[].component] ==
                  ["backend", "minio-mc", "minio-server", "postgres"]) and
                (.images | length == 4) and
                (.images | all(
                  (.report_sha256 | test("^sha256:[0-9a-f]{64}$"))
                )) and
                ([.images[] | {component, image}] == [
                  {component: "backend", image: $backend},
                  {component: "minio-mc", image: $minio_mc},
                  {component: "minio-server", image: $minio},
                  {component: "postgres", image: $postgres}
                ])
              ' "$identity_file" >/dev/null
          }

          verify_preapproval_artifact() {
            local directory="$1"
            local platform="$2"
            local expected_identity_sha256="$3"
            local expected_evidence_sha256="$4"
            local identity_file="$directory/scan-identity.json"
            local evidence_file="$directory/scan-evidence.json"
            [[ -f "$identity_file" && -f "$evidence_file" ]]
            [[ "sha256:$(sha256sum "$identity_file" | awk '{print $1}')" == \
              "$expected_identity_sha256" ]]
            [[ "sha256:$(sha256sum "$evidence_file" | awk '{print $1}')" == \
              "$expected_evidence_sha256" ]]
            validate_scan_identity "$identity_file" "$platform"
            jq --exit-status \
              --arg platform "$platform" \
              --arg identity_sha256 "$expected_identity_sha256" \
              --slurpfile identity "$identity_file" '
                .schema == "emfont.trivy-scan-evidence/v1" and
                .platform == $platform and
                .identity_sha256 == $identity_sha256 and
                .identity == $identity[0] and
                (.scanner_image | type == "string" and length > 0) and
                (.scanner_version | type == "string" and length > 0) and
                (.database_sha256 | test("^sha256:[0-9a-f]{64}$")) and
                (.database_updated_at | type == "string" and length > 0) and
                (.database_downloaded_at | type == "string" and length > 0) and
                (.scan_started_at | type == "string" and length > 0) and
                (.scan_finished_at | type == "string" and length > 0)
              ' "$evidence_file" >/dev/null

            while IFS=$'\t' read -r component report_sha256; do
              normalized="$directory/${component}-high-critical.normalized.json"
              [[ -f "$normalized" ]]
              [[ "sha256:$(sha256sum "$normalized" | awk '{print $1}')" == \
                "$report_sha256" ]]
            done < <(jq --exit-status --raw-output '
              .images[] | [.component, .report_sha256] | @tsv
            ' "$identity_file")
          }

          verify_preapproval_artifact \
            "$preapproval_dir/amd64" linux/amd64 \
            "$PREAPPROVAL_AMD64_IDENTITY_SHA256" \
            "$PREAPPROVAL_AMD64_EVIDENCE_SHA256"
          verify_preapproval_artifact \
            "$preapproval_dir/arm64" linux/arm64 \
            "$PREAPPROVAL_ARM64_IDENTITY_SHA256" \
            "$PREAPPROVAL_ARM64_EVIDENCE_SHA256"

          configure_trivy_pull_auth() {
            local reference="$1"
            local repository_path registry_token
            [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
            repository_path="${reference#ghcr.io/}"
            repository_path="${repository_path%@*}"
            registry_token="$(
              curl --fail-with-body --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --netrc-file "$pull_auth_file" \
                --get \
                --data-urlencode 'service=ghcr.io' \
                --data-urlencode "scope=repository:${repository_path}:pull" \
                https://ghcr.io/token | \
              jq --exit-status --raw-output '
                (.token // .access_token) as $token |
                if ($token | type == "string" and
                    length > 0 and length <= 16384)
                then $token
                else error("invalid GHCR pull token")
                end
              '
            )"
            [[ "$registry_token" =~ ^[A-Za-z0-9._~+/=-]+$ ]]
            printf '{"auths":{"ghcr.io":{"identitytoken":"%s"}}}\n' \
              "$registry_token" >"$pull_config_file.tmp"
            mv --force "$pull_config_file.tmp" "$pull_config_file"
            unset registry_token
          }

          trivy=(
            docker run --rm
            --volume "$pull_config_dir:/root/.docker:ro"
            --volume "$cache_dir:/root/.cache/trivy"
            --volume "$report_dir:/reports"
            "$TRIVY_IMAGE"
          )
          scan_started_epoch="$(date --utc +%s)"
          scan_started_at="$(date --utc --date="@$scan_started_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          "${trivy[@]}" image --download-db-only
          "${trivy[@]}" version --format json >"$report_dir/trivy-version.json"
          jq --exit-status --arg version "$TRIVY_VERSION" '
            .Version == $version and
            .VulnerabilityDB.Version == 2 and
            (.VulnerabilityDB.UpdatedAt | type == "string" and length > 0) and
            (.VulnerabilityDB.NextUpdate | type == "string" and length > 0) and
            (.VulnerabilityDB.DownloadedAt | type == "string" and length > 0)
          ' "$report_dir/trivy-version.json" >/dev/null
          now_epoch="$(date --utc +%s)"
          updated_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.UpdatedAt' "$report_dir/trivy-version.json")" +%s)"
          next_update_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.NextUpdate' "$report_dir/trivy-version.json")" +%s)"
          downloaded_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.DownloadedAt' "$report_dir/trivy-version.json")" +%s)"
          ((updated_epoch <= now_epoch + 300))
          ((now_epoch - updated_epoch <= db_max_age_seconds))
          ((downloaded_epoch >= scan_started_epoch - 300))
          ((downloaded_epoch <= now_epoch + 300))
          ((next_update_epoch > updated_epoch))
          ((next_update_epoch >= now_epoch - 300))
          db_file="$cache_dir/db/trivy.db"
          [[ -s "$db_file" ]]
          db_sha256="sha256:$(sha256sum "$db_file" | awk '{print $1}')"

          validate_scan_report() {
            local report="$1"
            local reference="$2"
            local architecture="$3"
            jq --exit-status \
              --arg reference "$reference" \
              --arg architecture "$architecture" '
                .SchemaVersion == 2 and
                .ArtifactName == $reference and
                .ArtifactType == "container_image" and
                .Metadata.ImageConfig.os == "linux" and
                .Metadata.ImageConfig.architecture == $architecture and
                (.Metadata.Layers | type == "array" and length > 0)
              ' "$report" >/dev/null
          }

          normalize_high_critical_report() {
            local report="$1"
            local reference="$2"
            local component="$3"
            local platform="$4"
            local output="$5"
            jq --sort-keys \
              --arg schema 'emfont.trivy-high-critical/v1' \
              --arg reference "$reference" \
              --arg component "$component" \
              --arg platform "$platform" '
                {
                  schema: $schema,
                  component: $component,
                  platform: $platform,
                  image: $reference,
                  findings: ([
                    .Results[]? as $result
                    | ($result.Vulnerabilities // [])[]
                    | select(.Severity == "HIGH" or .Severity == "CRITICAL")
                    | {
                        vulnerability_id: .VulnerabilityID,
                        target: $result.Target,
                        class: ($result.Class // ""),
                        type: ($result.Type // ""),
                        package: .PkgName,
                        installed_version: .InstalledVersion,
                        fixed_version: (.FixedVersion // ""),
                        status: (.Status // ""),
                        severity: .Severity
                      }
                  ] | unique_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]) | sort_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]))
                }
              ' "$report" >"$output"
          }

          create_scan_identity() {
            local rows_file="$1"
            local platform="$2"
            local output="$3"
            jq --raw-input --slurp --sort-keys \
              --arg schema 'emfont.trivy-scan-identity/v1' \
              --arg platform "$platform" '
                {
                  schema: $schema,
                  platform: $platform,
                  images: ([
                    split("\n")[]
                    | select(length > 0)
                    | split("\t")
                    | {
                        component: .[0],
                        image: .[1],
                        report_sha256: .[2]
                      }
                  ] | sort_by(.component))
                }
              ' "$rows_file" >"$output"
            validate_scan_identity "$output" "$platform"
          }

          for platform_spec in linux/amd64 linux/arm64; do
            architecture="${platform_spec#linux/}"
            platform_id="$architecture"
            rows_file="$RUNNER_TEMP/postapproval-$platform_id-identity.tsv"
            install -m 0600 /dev/null "$rows_file"
            for image_spec in \
              "$BACKEND_REF|backend" \
              "$POSTGRES_REF|postgres" \
              "$MINIO_REF|minio-server" \
              "$MINIO_MC_REF|minio-mc"
            do
              IFS='|' read -r reference component <<<"$image_spec"
              [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
              configure_trivy_pull_auth "$reference"
              report="$report_dir/${component}-${platform_id}-full.json"
              "${trivy[@]}" image \
                --image-src remote \
                --platform "$platform_spec" \
                --skip-db-update \
                --exit-code 0 --scanners vuln \
                --format json \
                --output "/reports/${component}-${platform_id}-full.json" \
                "$reference"
              rm --force "$pull_config_file"
              validate_scan_report "$report" "$reference" "$architecture"
              normalized="$report_dir/${component}-${platform_id}-high-critical.normalized.json"
              normalize_high_critical_report \
                "$report" "$reference" "$component" "$platform_spec" \
                "$normalized"
              if jq --exit-status \
                '.findings | any(.fixed_version != "")' \
                "$normalized" >/dev/null; then
                printf 'fixable HIGH/CRITICAL finding after approval: %s %s\n' \
                  "$component" "$platform_spec" >&2
                exit 1
              fi
              normalized_sha256="sha256:$(sha256sum "$normalized" | awk '{print $1}')"
              printf '%s\t%s\t%s\n' \
                "$component" "$reference" "$normalized_sha256" >>"$rows_file"
            done
            identity_file="$report_dir/scan-identity-$platform_id.json"
            create_scan_identity "$rows_file" "$platform_spec" "$identity_file"
            if [[ "$platform_spec" == linux/amd64 ]]; then
              pre_identity="$preapproval_dir/amd64/scan-identity.json"
            else
              pre_identity="$preapproval_dir/arm64/scan-identity.json"
            fi
            cmp --silent "$pre_identity" "$identity_file"
          done

          expected_entries_ndjson="$RUNNER_TEMP/expected-cve-acceptances.ndjson"
          install -m 0600 /dev/null "$expected_entries_ndjson"
          for platform_spec in linux/amd64 linux/arm64; do
            platform_id="${platform_spec#linux/}"
            identity_file="$report_dir/scan-identity-$platform_id.json"
            while IFS=$'\t' read -r component reference report_sha256; do
              normalized="$report_dir/${component}-${platform_id}-high-critical.normalized.json"
              jq --compact-output \
                --arg component "$component" \
                --arg platform "$platform_spec" \
                --arg image "$reference" \
                --arg source_sha "$GITHUB_SHA" \
                --arg report_sha256 "$report_sha256" '
                  .findings[]
                  | select(.fixed_version == "")
                  | {
                      vulnerability_id,
                      target,
                      class,
                      type,
                      package,
                      installed_version,
                      fixed_version,
                      status,
                      severity,
                      component: $component,
                      platform: $platform,
                      image: $image,
                      source_sha: $source_sha,
                      report_sha256: $report_sha256
                    }
                ' "$normalized" >>"$expected_entries_ndjson"
            done < <(jq --exit-status --raw-output '
              .images[] | [.component, .image, .report_sha256] | @tsv
            ' "$identity_file")
          done
          expected_identities="$RUNNER_TEMP/expected-cve-acceptance-identities.json"
          jq --slurp --sort-keys '
            unique_by([
              .platform,
              .component,
              .vulnerability_id,
              .target,
              .class,
              .type,
              .package,
              .installed_version,
              .fixed_version,
              .status,
              .severity,
              .image,
              .source_sha,
              .report_sha256
            ]) | sort_by([
              .platform,
              .component,
              .vulnerability_id,
              .target,
              .class,
              .type,
              .package,
              .installed_version,
              .fixed_version,
              .status,
              .severity,
              .image,
              .source_sha,
              .report_sha256
            ])
          ' "$expected_entries_ndjson" >"$expected_identities"
          cp "$expected_identities" \
            "$report_dir/required-cve-acceptance-identities.json"
          jq --null-input --sort-keys \
            --arg schema 'emfont.cve-acceptance-contract/v1' \
            --arg document_schema 'emfont.cve-acceptance/v1' \
            --arg input_variable 'EMFONT_CVE_ACCEPTANCE_B64' \
            --arg owner_user 'github:user/<login>' \
            --arg owner_team 'github:team/<organization>/<team-slug>' \
            --arg security_reviewer 'github:user/<login>' \
            --arg required_identities 'required-cve-acceptance-identities.json' \
            --argjson max_encoded_bytes "$acceptance_max_encoded_bytes" \
            --argjson max_decoded_bytes "$acceptance_max_decoded_bytes" \
            --argjson max_expiry_seconds "$acceptance_max_seconds" \
            --argjson max_controls "$acceptance_max_controls" \
            --argjson max_control_chars "$acceptance_max_control_chars" \
            --argjson max_ticket_chars "$acceptance_max_ticket_chars" '
              {
                schema: $schema,
                document_schema: $document_schema,
                input_variable: $input_variable,
                encoding: "RFC4648 base64 without whitespace",
                max_encoded_bytes: $max_encoded_bytes,
                max_decoded_bytes: $max_decoded_bytes,
                max_expiry_seconds_from_validation: $max_expiry_seconds,
                owner_formats: [$owner_user, $owner_team],
                security_reviewer_format: $security_reviewer,
                compensating_controls: {
                  min_items: 1,
                  max_items: $max_controls,
                  min_characters_per_item: 10,
                  max_characters_per_item: $max_control_chars,
                  control_characters_allowed: false
                },
                ticket: {
                  min_characters: 3,
                  max_characters: $max_ticket_chars,
                  whitespace_or_control_characters_allowed: false
                },
                required_top_level_keys: [
                  "acceptances",
                  "schema",
                  "source_sha"
                ],
                required_acceptance_keys: [
                  "class",
                  "compensating_controls",
                  "component",
                  "expires_at",
                  "fixed_version",
                  "image",
                  "installed_version",
                  "owner",
                  "package",
                  "platform",
                  "rationale",
                  "report_sha256",
                  "security_reviewer",
                  "severity",
                  "source_sha",
                  "status",
                  "target",
                  "ticket",
                  "type",
                  "vulnerability_id"
                ],
                required_identities_file: $required_identities,
                matching: "exact set; missing, duplicate, or extra identities fail",
                acceptance_is_external: true
              }
            ' >"$report_dir/cve-acceptance-contract.json"
          expected_acceptance_count="$(jq 'length' "$expected_identities")"
          [[ "$expected_acceptance_count" =~ ^[0-9]+$ ]]

          acceptance_sha256=none
          acceptance_evidence_base64=none
          if ((expected_acceptance_count == 0)); then
            [[ -z "$CVE_ACCEPTANCE_B64" ]]
          else
            [[ -n "$CVE_ACCEPTANCE_B64" ]]
            ((${#CVE_ACCEPTANCE_B64} <= acceptance_max_encoded_bytes))
            [[ "$CVE_ACCEPTANCE_B64" =~ ^[A-Za-z0-9+/]*={0,2}$ ]]
            ((${#CVE_ACCEPTANCE_B64} % 4 == 0))
            acceptance_file="$RUNNER_TEMP/cve-acceptance.json"
            printf '%s' "$CVE_ACCEPTANCE_B64" | \
              base64 --decode >"$acceptance_file"
            acceptance_size="$(stat --format '%s' "$acceptance_file")"
            ((acceptance_size > 0 && acceptance_size <= acceptance_max_decoded_bytes))
            python3 - "$acceptance_file" <<'PY'
          import json
          import pathlib
          import sys

          def object_without_duplicates(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key}")
                  result[key] = value
              return result

          def reject_constant(value):
              raise ValueError(f"non-finite JSON number: {value}")

          def validate_depth(value, depth=0):
              if depth > 32:
                  raise ValueError("JSON nesting exceeds 32 levels")
              if isinstance(value, dict):
                  for key, child in value.items():
                      if not isinstance(key, str):
                          raise ValueError("JSON object key is not a string")
                      validate_depth(child, depth + 1)
              elif isinstance(value, list):
                  for child in value:
                      validate_depth(child, depth + 1)

          raw = pathlib.Path(sys.argv[1]).read_bytes()
          text = raw.decode("utf-8", errors="strict")
          document = json.loads(
              text,
              object_pairs_hook=object_without_duplicates,
              parse_constant=reject_constant,
          )
          validate_depth(document)
          PY
            canonical_acceptance="$RUNNER_TEMP/cve-acceptance.canonical.json"
            jq --sort-keys --compact-output '.' \
              "$acceptance_file" >"$canonical_acceptance"
            jq --exit-status \
              --arg source_sha "$GITHUB_SHA" '
                (keys == ["acceptances", "schema", "source_sha"]) and
                .schema == "emfont.cve-acceptance/v1" and
                .source_sha == $source_sha and
                (.acceptances | type == "array" and length > 0) and
                (.acceptances | all(
                  keys == [
                    "class",
                    "compensating_controls",
                    "component",
                    "expires_at",
                    "fixed_version",
                    "image",
                    "installed_version",
                    "owner",
                    "package",
                    "platform",
                    "rationale",
                    "report_sha256",
                    "security_reviewer",
                    "severity",
                    "source_sha",
                    "status",
                    "target",
                    "ticket",
                    "type",
                    "vulnerability_id"
                  ] and
                  (.vulnerability_id | type == "string" and
                    test("^[A-Za-z0-9][A-Za-z0-9._:-]{1,127}$")) and
                  (.component == "backend" or .component == "postgres" or
                    .component == "minio-server" or .component == "minio-mc") and
                  (.platform == "linux/amd64" or .platform == "linux/arm64") and
                  (.image | type == "string" and
                    test("^ghcr\\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$")) and
                  (.target | type == "string" and length > 0 and length <= 1024) and
                  (.class | type == "string" and length <= 128) and
                  (.type | type == "string" and length <= 128) and
                  (.package | type == "string" and length > 0 and length <= 512) and
                  (.installed_version | type == "string" and length > 0 and length <= 512) and
                  .fixed_version == "" and
                  (.status | type == "string" and length <= 128) and
                  (.severity == "HIGH" or .severity == "CRITICAL") and
                  (.expires_at | type == "string" and
                    test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$")) and
                  (.owner | type == "string" and
                    test("^github:(user/[A-Za-z0-9-]{1,39}|team/[A-Za-z0-9_.-]{1,39}/[A-Za-z0-9_.-]{1,100})$")) and
                  (.rationale | type == "string" and length >= 20 and length <= 1000 and
                    (test("[[:cntrl:]]") | not)) and
                  (.compensating_controls | type == "array" and
                    length >= 1 and length <= 8 and
                    all(
                      type == "string" and length >= 10 and length <= 500 and
                      (test("[[:cntrl:]]") | not) and
                      test("[^[:space:]]")
                    ) and
                    (unique | length) == length) and
                  (.security_reviewer | type == "string" and
                    test("^github:user/[A-Za-z0-9-]{1,39}$")) and
                  (.ticket | type == "string" and length >= 3 and length <= 256 and
                    (test("[[:space:]]") | not) and
                    (test("[[:cntrl:]]") | not) and
                    test("[A-Za-z0-9]")) and
                  .source_sha == $source_sha and
                  (.report_sha256 | test("^sha256:[0-9a-f]{64}$"))
                ))
              ' "$canonical_acceptance" >/dev/null

            actual_identities="$RUNNER_TEMP/actual-cve-acceptance-identities.json"
            jq --sort-keys '
              [.acceptances[] | del(
                .compensating_controls,
                .expires_at,
                .owner,
                .rationale,
                .security_reviewer,
                .ticket
              )]
              | sort_by([
                  .platform,
                  .component,
                  .vulnerability_id,
                  .target,
                  .class,
                  .type,
                  .package,
                  .installed_version,
                  .fixed_version,
                  .status,
                  .severity,
                  .image,
                  .source_sha,
                  .report_sha256
                ])
              ' "$canonical_acceptance" >"$actual_identities"
            cmp --silent "$expected_identities" "$actual_identities"
            [[ "$(jq '.acceptances | length' "$canonical_acceptance")" == \
              "$expected_acceptance_count" ]]

            now_epoch="$(date --utc +%s)"
            while IFS= read -r expires_at; do
              expires_epoch="$(date --utc --date="$expires_at" +%s)"
              ((expires_epoch > now_epoch))
              ((expires_epoch - now_epoch <= acceptance_max_seconds))
            done < <(jq --exit-status --raw-output \
              '.acceptances[].expires_at' "$canonical_acceptance")
            acceptance_sha256="sha256:$(sha256sum \
              "$canonical_acceptance" | awk '{print $1}')"
            acceptance_evidence_base64="$(base64 --wrap=0 \
              "$canonical_acceptance")"
          fi

          scan_finished_epoch="$(date --utc +%s)"
          scan_finished_at="$(date --utc --date="@$scan_finished_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          ((scan_finished_epoch >= scan_started_epoch))
          ((scan_finished_epoch - scan_started_epoch <= 3600))
          ((scan_finished_epoch - downloaded_epoch <= scan_max_age_seconds))
          combined_identity="$report_dir/scan-identities.json"
          jq --null-input --sort-keys \
            --slurpfile amd64 "$report_dir/scan-identity-amd64.json" \
            --slurpfile arm64 "$report_dir/scan-identity-arm64.json" '
              {
                schema: "emfont.trivy-combined-scan-identity/v1",
                identities: [$amd64[0], $arm64[0]]
              }
            ' >"$combined_identity"
          combined_identity_sha256="sha256:$(sha256sum \
            "$combined_identity" | awk '{print $1}')"
          post_evidence="$report_dir/scan-evidence.json"
          jq --null-input --sort-keys \
            --arg schema 'emfont.trivy-postapproval-evidence/v1' \
            --arg scanner_image "$TRIVY_IMAGE" \
            --arg scanner_version "$TRIVY_VERSION" \
            --arg db_sha256 "$db_sha256" \
            --arg db_updated_at "$(jq --raw-output \
              '.VulnerabilityDB.UpdatedAt' "$report_dir/trivy-version.json")" \
            --arg db_downloaded_at "$(jq --raw-output \
              '.VulnerabilityDB.DownloadedAt' "$report_dir/trivy-version.json")" \
            --arg scan_started_at "$scan_started_at" \
            --arg scan_finished_at "$scan_finished_at" \
            --arg identity_sha256 "$combined_identity_sha256" \
            --arg source_sha "$GITHUB_SHA" \
            --arg pre_amd64_identity "$PREAPPROVAL_AMD64_IDENTITY_SHA256" \
            --arg pre_amd64_evidence "$PREAPPROVAL_AMD64_EVIDENCE_SHA256" \
            --arg pre_arm64_identity "$PREAPPROVAL_ARM64_IDENTITY_SHA256" \
            --arg pre_arm64_evidence "$PREAPPROVAL_ARM64_EVIDENCE_SHA256" \
            --arg acceptance_sha256 "$acceptance_sha256" \
            --argjson acceptance_count "$expected_acceptance_count" \
            --slurpfile identities "$combined_identity" '
              {
                schema: $schema,
                scanner_image: $scanner_image,
                scanner_version: $scanner_version,
                database_sha256: $db_sha256,
                database_updated_at: $db_updated_at,
                database_downloaded_at: $db_downloaded_at,
                scan_started_at: $scan_started_at,
                scan_finished_at: $scan_finished_at,
                source_sha: $source_sha,
                preapproval: {
                  amd64: {
                    identity_sha256: $pre_amd64_identity,
                    evidence_sha256: $pre_amd64_evidence
                  },
                  arm64: {
                    identity_sha256: $pre_arm64_identity,
                    evidence_sha256: $pre_arm64_evidence
                  }
                },
                identity_sha256: $identity_sha256,
                identities: $identities[0],
                acceptance_sha256: $acceptance_sha256,
                acceptance_count: $acceptance_count
              }
            ' >"$post_evidence"
          post_evidence_sha256="sha256:$(sha256sum \
            "$post_evidence" | awk '{print $1}')"
          {
            printf 'verified=true\n'
            printf 'identity_sha256=%s\n' "$combined_identity_sha256"
            printf 'evidence_sha256=%s\n' "$post_evidence_sha256"
            printf 'database_sha256=%s\n' "$db_sha256"
            printf 'database_updated_at=%s\n' \
              "$(jq --raw-output '.VulnerabilityDB.UpdatedAt' \
                "$report_dir/trivy-version.json")"
            printf 'scan_finished_at=%s\n' "$scan_finished_at"
            printf 'scan_finished_epoch=%s\n' "$scan_finished_epoch"
            printf 'acceptance_sha256=%s\n' "$acceptance_sha256"
            printf 'acceptance_count=%s\n' "$expected_acceptance_count"
            printf 'acceptance_evidence_base64=%s\n' \
              "$acceptance_evidence_base64"
          } >>"$GITHUB_OUTPUT"

      - name: Upload post-approval security evidence
        id: post_trivy_artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-release-postapproval-security-${{ needs.publish.outputs.version }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/postapproval-trivy-reports/
          if-no-files-found: warn
          retention-days: 90

      - name: Verify protected production environment policy
        id: environment
        env:
          GH_TOKEN: ${{ github.token }}
          CVE_ACCEPTANCE_SHA256: ${{ steps.post_trivy.outputs.acceptance_sha256 }}
          CVE_ACCEPTANCE_COUNT: ${{ steps.post_trivy.outputs.acceptance_count }}
          CVE_ACCEPTANCE_EVIDENCE_BASE64: ${{ steps.post_trivy.outputs.acceptance_evidence_base64 }}
        run: |
          set -euo pipefail
          readonly environment_name=backend-production
          readonly api_version=2022-11-28
          environment_json="$RUNNER_TEMP/backend-production-environment.json"
          policies_json="$RUNNER_TEMP/backend-production-deployment-policies.json"
          approvals_json="$RUNNER_TEMP/backend-production-run-approvals.json"
          evidence_json="$RUNNER_TEMP/backend-production-environment-evidence.json"
          reviewer_policy_json="$RUNNER_TEMP/backend-production-reviewer-policy.json"
          acceptance_approval_json="$RUNNER_TEMP/backend-production-cve-acceptance.json"

          [[ "$GITHUB_REF" == refs/heads/main ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$CVE_ACCEPTANCE_COUNT" =~ ^[0-9]+$ ]]
          if ((CVE_ACCEPTANCE_COUNT == 0)); then
            [[ "$CVE_ACCEPTANCE_SHA256" == none ]]
            [[ "$CVE_ACCEPTANCE_EVIDENCE_BASE64" == none ]]
          else
            [[ "$CVE_ACCEPTANCE_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$CVE_ACCEPTANCE_EVIDENCE_BASE64" =~ ^[A-Za-z0-9+/]*={0,2}$ ]]
            ((${#CVE_ACCEPTANCE_EVIDENCE_BASE64} % 4 == 0))
            printf '%s' "$CVE_ACCEPTANCE_EVIDENCE_BASE64" | \
              base64 --decode >"$acceptance_approval_json"
            [[ "sha256:$(sha256sum "$acceptance_approval_json" | awk '{print $1}')" == \
              "$CVE_ACCEPTANCE_SHA256" ]]
            jq --exit-status \
              --arg source_sha "$GITHUB_SHA" \
              --argjson acceptance_count "$CVE_ACCEPTANCE_COUNT" '
                .schema == "emfont.cve-acceptance/v1" and
                .source_sha == $source_sha and
                (.acceptances | type == "array" and
                  length == $acceptance_count and
                  all(.security_reviewer | type == "string" and
                    test("^github:user/[A-Za-z0-9-]{1,39}$")))
              ' "$acceptance_approval_json" >/dev/null
          fi
          approval_comment="emfont-release-approval/v1 source_sha=$GITHUB_SHA run_attempt=$GITHUB_RUN_ATTEMPT cve_acceptance_sha256=$CVE_ACCEPTANCE_SHA256"

          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/environments/$environment_name" \
            >"$environment_json"
          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/environments/$environment_name/deployment-branch-policies?per_page=100" \
            >"$policies_json"
          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/approvals" \
            >"$approvals_json"
          (("$(stat --format '%s' "$environment_json")" > 0))
          (("$(stat --format '%s' "$environment_json")" <= 1048576))
          (("$(stat --format '%s' "$policies_json")" > 0))
          (("$(stat --format '%s' "$policies_json")" <= 1048576))
          (("$(stat --format '%s' "$approvals_json")" > 0))
          (("$(stat --format '%s' "$approvals_json")" <= 1048576))
          bash backend/scripts/workflow-reviewer-policy.sh \
            "$environment_json" \
            "$approvals_json" \
            "$approval_comment" \
            "$GITHUB_ACTOR" \
            "$reviewer_policy_json"
          reviewer_policy_sha256="sha256:$(sha256sum \
            "$reviewer_policy_json" | awk '{print $1}')"
          [[ "$reviewer_policy_sha256" =~ ^sha256:[0-9a-f]{64}$ ]]

          jq --exit-status \
            --arg name "$environment_name" \
            --arg repository "$GITHUB_REPOSITORY" '
              .name == $name and
              (.id | type == "number" and . > 0 and floor == .) and
              .url == ("https://api.github.com/repos/" + $repository +
                "/environments/" + $name) and
              (.created_at | type == "string" and length > 0) and
              (.updated_at | type == "string" and length > 0) and
              (has("can_admins_bypass") and .can_admins_bypass == false) and
              (.protection_rules | type == "array") and
              ([.protection_rules[] | select(.type == "required_reviewers")] as $rules |
                ($rules | length == 1) and
                $rules[0].prevent_self_review == true and
                ($rules[0].reviewers | type == "array" and
                  length >= 1 and length <= 6 and all(
                    (.type == "User" or .type == "Team") and
                    (.reviewer | type == "object") and
                    (.reviewer.id | type == "number" and . > 0 and floor == .) and
                    (if .type == "User" then
                      (.reviewer.login | type == "string" and
                        test("^[A-Za-z0-9-]{1,39}$"))
                    else
                      (.reviewer.slug | type == "string" and
                        test("^[A-Za-z0-9_.-]{1,100}$"))
                    end)
                  ))) and
              .deployment_branch_policy.protected_branches == false and
              .deployment_branch_policy.custom_branch_policies == true
            ' "$environment_json" >/dev/null

          jq --exit-status '
            if type == "object" and
               (.branch_policies | type == "array") and
               (.total_count | type == "number" and . >= 0 and floor == .)
            then
              .total_count == (.branch_policies | length) and
              .total_count == 1 and
              [.branch_policies[] | {name, type}] == [
                {name: "main", type: "branch"}
              ] and
              (.branch_policies | all(
                (.id | type == "number" and . > 0 and floor == .) and
                (.node_id | type == "string" and length > 0) and
                .name == "main" and
                .type == "branch"
              )) and
              ((.branch_policies | map(.id) | unique | length) == 1)
            else false
            end
          ' "$policies_json" >/dev/null

          environment_id="$(jq --raw-output '.id' "$environment_json")"
          jq --exit-status \
            --arg environment_name "$environment_name" \
            --arg actor "$GITHUB_ACTOR" \
            --arg approval_comment "$approval_comment" \
            --argjson environment_id "$environment_id" '
              type == "array" and
              ([.[] | select(
                .state == "approved" and
                (.user | type == "object") and
                (.user.id | type == "number" and . > 0 and floor == .) and
                (.user.login | type == "string" and
                  test("^[A-Za-z0-9-]{1,39}$")) and
                ((.user.login | ascii_downcase) != ($actor | ascii_downcase)) and
                .comment == $approval_comment and
                (.environments | type == "array" and any(
                  .id == $environment_id and .name == $environment_name
                ))
              )] | length >= 1)
            ' "$approvals_json" >/dev/null

          if ((CVE_ACCEPTANCE_COUNT > 0)); then
            jq --exit-status \
              --arg environment_name "$environment_name" \
              --arg actor "$GITHUB_ACTOR" \
              --arg approval_comment "$approval_comment" \
              --argjson environment_id "$environment_id" \
              --slurpfile reviewer_policy "$reviewer_policy_json" '
                .acceptances | all(
                  (.security_reviewer |
                    ltrimstr("github:user/") | ascii_downcase) as $reviewer |
                  $reviewer != ($actor | ascii_downcase) and
                  ($reviewer_policy[0].approvals | any(
                    ((.user.login | ascii_downcase) == $reviewer) and
                    .comment == $approval_comment and
                    (.environments | type == "array" and any(
                      .id == $environment_id and .name == $environment_name
                    ))
                  ))
                )
              ' "$acceptance_approval_json" >/dev/null
          fi

          jq --sort-keys --compact-output \
            --arg schema 'emfont.github-environment-policy/v1' \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow_run_id "$GITHUB_RUN_ID" \
            --arg workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg source_sha "$GITHUB_SHA" \
            --arg source_ref "$GITHUB_REF" \
            --arg environment_name "$environment_name" \
            --arg actor "$GITHUB_ACTOR" \
            --arg approval_comment "$approval_comment" \
            --arg acceptance_sha256 "$CVE_ACCEPTANCE_SHA256" \
            --arg reviewer_policy_sha256 "$reviewer_policy_sha256" \
            --argjson environment_id "$environment_id" \
            --slurpfile policies "$policies_json" \
            --slurpfile approvals "$approvals_json" \
            --slurpfile reviewer_policy "$reviewer_policy_json" '
              {
                schema: $schema,
                repository: $repository,
                workflow_run_id: $workflow_run_id,
                workflow_run_attempt: $workflow_run_attempt,
                source_sha: $source_sha,
                source_ref: $source_ref,
                approval_contract: {
                  schema: "emfont-release-approval/v1",
                  comment: $approval_comment,
                  source_sha: $source_sha,
                  run_attempt: $workflow_run_attempt,
                  cve_acceptance_sha256: $acceptance_sha256,
                  reviewer_policy_sha256: $reviewer_policy_sha256
                },
                environment: {
                  id,
                  name,
                  created_at,
                  updated_at,
                  can_admins_bypass,
                  protection_rules: (.protection_rules | map(
                    if .type == "required_reviewers" then
                      .reviewers = (.reviewers | sort_by(.type, .reviewer.id))
                    else . end
                  ) | sort_by(.type, .id)),
                  deployment_branch_policy,
                  deployment_policies:
                    ($policies[0].branch_policies | sort_by(.type, .name)),
                  reviewer_policy: $reviewer_policy[0],
                  approvals: ([$approvals[0][] | select(
                    .state == "approved" and
                    (.user | type == "object") and
                    (.user.id | type == "number" and . > 0 and floor == .) and
                    (.user.login | type == "string" and
                      test("^[A-Za-z0-9-]{1,39}$")) and
                    ((.user.login | ascii_downcase) != ($actor | ascii_downcase)) and
                    .comment == $approval_comment and
                    (.environments | type == "array" and any(
                      .id == $environment_id and .name == $environment_name
                    ))
                  ) | {
                    state,
                    user: {id: .user.id, login: .user.login},
                    comment,
                    environments: ([.environments[] | {
                      id,
                      name,
                      node_id,
                      url,
                      html_url
                    }] | sort_by(.id))
                  }] | sort_by(.user.id, .comment))
                }
              }
            ' "$environment_json" >"$evidence_json"
          jq --exit-status \
            --arg approval_comment "$approval_comment" \
            --arg acceptance_sha256 "$CVE_ACCEPTANCE_SHA256" \
            --arg reviewer_policy_sha256 "$reviewer_policy_sha256" '
            .schema == "emfont.github-environment-policy/v1" and
            .environment.name == "backend-production" and
            .environment.can_admins_bypass == false and
            .approval_contract.schema == "emfont-release-approval/v1" and
            .approval_contract.comment == $approval_comment and
            .approval_contract.cve_acceptance_sha256 == $acceptance_sha256 and
            .approval_contract.reviewer_policy_sha256 ==
              $reviewer_policy_sha256 and
            .environment.reviewer_policy.schema ==
              "emfont.reviewer-policy-evidence/v1" and
            (.environment.approvals | type == "array" and length >= 1 and
              all(.comment == $approval_comment)) and
            .environment.deployment_policies == [
              {name: "main", type: "branch"}
            ]
          ' "$evidence_json" >/dev/null
          evidence_sha256="sha256:$(sha256sum "$evidence_json" | awk '{print $1}')"
          evidence_base64="$(base64 --wrap=0 "$evidence_json")"
          required_reviewer_count="$(jq --raw-output '
            [.protection_rules[] | select(.type == "required_reviewers")]
            | .[0].reviewers | length
          ' "$environment_json")"
          approval_count="$(jq --raw-output \
            '.environment.approvals | length' "$evidence_json")"
          verified_epoch="$(date --utc +%s)"
          {
            printf 'verified=true\n'
            printf 'environment_id=%s\n' \
              "$(jq --raw-output '.id' "$environment_json")"
            printf 'environment_updated_at=%s\n' \
              "$(jq --raw-output '.updated_at' "$environment_json")"
            printf 'required_reviewer_count=%s\n' "$required_reviewer_count"
            printf 'approval_count=%s\n' "$approval_count"
            printf 'prevent_self_review=true\n'
            printf 'admin_bypass=false\n'
            printf 'deployment_policies=branch:main\n'
            printf 'reviewer_policy_sha256=%s\n' "$reviewer_policy_sha256"
            printf 'evidence_sha256=%s\n' "$evidence_sha256"
            printf 'evidence_base64=%s\n' "$evidence_base64"
            printf 'verified_epoch=%s\n' "$verified_epoch"
          } >>"$GITHUB_OUTPUT"

      - name: Promote verified digests idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMOTION_REVERIFIED: ${{ steps.reverify.outputs.verified }}
          POSTAPPROVAL_TRIVY_VERIFIED: ${{ steps.post_trivy.outputs.verified }}
          POSTAPPROVAL_TRIVY_FINISHED_EPOCH: ${{ steps.post_trivy.outputs.scan_finished_epoch }}
          CVE_ACCEPTANCE_SHA256: ${{ steps.post_trivy.outputs.acceptance_sha256 }}
          CVE_ACCEPTANCE_COUNT: ${{ steps.post_trivy.outputs.acceptance_count }}
          PRODUCTION_ENVIRONMENT_VERIFIED: ${{ steps.environment.outputs.verified }}
          PRODUCTION_ENVIRONMENT_EVIDENCE_SHA256: ${{ steps.environment.outputs.evidence_sha256 }}
          PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH: ${{ steps.environment.outputs.verified_epoch }}
        run: |
          set -euo pipefail
          readonly manifest_accept='application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json'
          readonly environment_name=backend-production
          readonly api_version=2022-11-28
          auth_file="$RUNNER_TEMP/ghcr-promotion-auth.netrc"
          registry_config="$RUNNER_TEMP/ghcr-promotion-bearer.conf"
          headers_file="$RUNNER_TEMP/ghcr-promotion-headers"
          environment_json="$RUNNER_TEMP/backend-production-environment-recheck.json"
          policies_json="$RUNNER_TEMP/backend-production-deployment-policies-recheck.json"
          approvals_json="$RUNNER_TEMP/backend-production-run-approvals-recheck.json"
          evidence_json="$RUNNER_TEMP/backend-production-environment-evidence-recheck.json"
          reviewer_policy_json="$RUNNER_TEMP/backend-production-reviewer-policy-recheck.json"
          cleanup_registry_auth() {
            rm --force \
              "$auth_file" \
              "$registry_config" \
              "$headers_file" \
              "$environment_json" \
              "$policies_json" \
              "$approvals_json" \
              "$evidence_json" \
              "$reviewer_policy_json"
          }
          trap cleanup_registry_auth EXIT
          umask 077
          install -m 0600 /dev/null "$auth_file"
          printf 'machine ghcr.io login %s password %s\n' \
            "$GITHUB_ACTOR" "$GHCR_TOKEN" >"$auth_file"

          [[ "$AMD64_GATE_APPROVED" == true ]]
          [[ "$ARM64_GATE_APPROVED" == true ]]
          [[ "$BUILDKIT_SBOM_VERIFIED" == true ]]
          [[ "$BUILDKIT_PROVENANCE_VERIFIED" == true ]]
          [[ "$GITHUB_PROVENANCE_VERIFIED" == true ]]
          [[ "$REPRODUCIBILITY_VERIFIED" == true ]]
          [[ "$SIGNATURES_VERIFIED" == true ]]
          [[ "$PROMOTION_REVERIFIED" == true ]]
          [[ "$POSTAPPROVAL_TRIVY_VERIFIED" == true ]]
          [[ "$PRODUCTION_ENVIRONMENT_VERIFIED" == true ]]
          [[ "$POSTAPPROVAL_TRIVY_FINISHED_EPOCH" =~ ^[1-9][0-9]*$ ]]
          [[ "$PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH" =~ ^[1-9][0-9]*$ ]]
          [[ "$PRODUCTION_ENVIRONMENT_EVIDENCE_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$CVE_ACCEPTANCE_COUNT" =~ ^[0-9]+$ ]]
          if ((CVE_ACCEPTANCE_COUNT == 0)); then
            [[ "$CVE_ACCEPTANCE_SHA256" == none ]]
          else
            [[ "$CVE_ACCEPTANCE_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]]
          fi
          approval_comment="emfont-release-approval/v1 source_sha=$GITHUB_SHA run_attempt=$GITHUB_RUN_ATTEMPT cve_acceptance_sha256=$CVE_ACCEPTANCE_SHA256"
          now_epoch="$(date --utc +%s)"
          ((now_epoch - POSTAPPROVAL_TRIVY_FINISHED_EPOCH >= 0))
          ((now_epoch - POSTAPPROVAL_TRIVY_FINISHED_EPOCH <= 1800))
          ((now_epoch - PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH >= 0))
          ((now_epoch - PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH <= 300))

          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/environments/$environment_name" \
            >"$environment_json"
          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/environments/$environment_name/deployment-branch-policies?per_page=100" \
            >"$policies_json"
          gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header "X-GitHub-Api-Version: $api_version" \
            "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/approvals" \
            >"$approvals_json"
          bash backend/scripts/workflow-reviewer-policy.sh \
            "$environment_json" \
            "$approvals_json" \
            "$approval_comment" \
            "$GITHUB_ACTOR" \
            "$reviewer_policy_json"
          cmp --silent \
            "$RUNNER_TEMP/backend-production-reviewer-policy.json" \
            "$reviewer_policy_json"
          reviewer_policy_sha256="sha256:$(sha256sum \
            "$reviewer_policy_json" | awk '{print $1}')"
          [[ "$reviewer_policy_sha256" == \
            "${{ steps.environment.outputs.reviewer_policy_sha256 }}" ]]
          environment_id="$(jq --raw-output '.id' "$environment_json")"
          jq --sort-keys --compact-output \
            --arg schema 'emfont.github-environment-policy/v1' \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow_run_id "$GITHUB_RUN_ID" \
            --arg workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg source_sha "$GITHUB_SHA" \
            --arg source_ref "$GITHUB_REF" \
            --arg environment_name "$environment_name" \
            --arg actor "$GITHUB_ACTOR" \
            --arg approval_comment "$approval_comment" \
            --arg acceptance_sha256 "$CVE_ACCEPTANCE_SHA256" \
            --arg reviewer_policy_sha256 "$reviewer_policy_sha256" \
            --argjson environment_id "$environment_id" \
            --slurpfile policies "$policies_json" \
            --slurpfile approvals "$approvals_json" \
            --slurpfile reviewer_policy "$reviewer_policy_json" '
              {
                schema: $schema,
                repository: $repository,
                workflow_run_id: $workflow_run_id,
                workflow_run_attempt: $workflow_run_attempt,
                source_sha: $source_sha,
                source_ref: $source_ref,
                approval_contract: {
                  schema: "emfont-release-approval/v1",
                  comment: $approval_comment,
                  source_sha: $source_sha,
                  run_attempt: $workflow_run_attempt,
                  cve_acceptance_sha256: $acceptance_sha256,
                  reviewer_policy_sha256: $reviewer_policy_sha256
                },
                environment: {
                  id,
                  name,
                  created_at,
                  updated_at,
                  can_admins_bypass,
                  protection_rules: (.protection_rules | map(
                    if .type == "required_reviewers" then
                      .reviewers = (.reviewers | sort_by(.type, .reviewer.id))
                    else . end
                  ) | sort_by(.type, .id)),
                  deployment_branch_policy,
                  deployment_policies:
                    ($policies[0].branch_policies | sort_by(.type, .name)),
                  reviewer_policy: $reviewer_policy[0],
                  approvals: ([$approvals[0][] | select(
                    .state == "approved" and
                    (.user | type == "object") and
                    (.user.id | type == "number" and . > 0 and floor == .) and
                    (.user.login | type == "string" and
                      test("^[A-Za-z0-9-]{1,39}$")) and
                    ((.user.login | ascii_downcase) != ($actor | ascii_downcase)) and
                    .comment == $approval_comment and
                    (.environments | type == "array" and any(
                      .id == $environment_id and .name == $environment_name
                    ))
                  ) | {
                    state,
                    user: {id: .user.id, login: .user.login},
                    comment,
                    environments: ([.environments[] | {
                      id,
                      name,
                      node_id,
                      url,
                      html_url
                    }] | sort_by(.id))
                  }] | sort_by(.user.id, .comment))
                }
              }
            ' "$environment_json" >"$evidence_json"
          [[ "sha256:$(sha256sum "$evidence_json" | awk '{print $1}')" == \
            "$PRODUCTION_ENVIRONMENT_EVIDENCE_SHA256" ]]
          cmp --silent \
            "$RUNNER_TEMP/backend-production-environment-evidence.json" \
            "$evidence_json"
          now_epoch="$(date --utc +%s)"
          ((now_epoch - POSTAPPROVAL_TRIVY_FINISHED_EPOCH >= 0))
          ((now_epoch - POSTAPPROVAL_TRIVY_FINISHED_EPOCH <= 1800))
          ((now_epoch - PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH >= 0))
          ((now_epoch - PRODUCTION_ENVIRONMENT_VERIFIED_EPOCH <= 300))
          [[ "$CVE_ACCEPTANCE_COUNT" =~ ^[0-9]+$ ]]
          if ((CVE_ACCEPTANCE_COUNT == 0)); then
            [[ "$CVE_ACCEPTANCE_SHA256" == none ]]
            [[ ! -e "$RUNNER_TEMP/cve-acceptance.canonical.json" ]]
          else
            [[ "$CVE_ACCEPTANCE_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]]
            acceptance_file="$RUNNER_TEMP/cve-acceptance.canonical.json"
            [[ -f "$acceptance_file" ]]
            [[ "sha256:$(sha256sum "$acceptance_file" | awk '{print $1}')" == \
              "$CVE_ACCEPTANCE_SHA256" ]]
            while IFS= read -r expires_at; do
              expires_epoch="$(date --utc --date="$expires_at" +%s)"
              ((expires_epoch > now_epoch))
            done < <(jq --exit-status --raw-output \
              '.acceptances[].expires_at' "$acceptance_file")
          fi

          configure_registry_auth() {
            local image_path="$1"
            local registry_token
            registry_token="$(
              curl --fail-with-body --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --netrc-file "$auth_file" \
                --get \
                --data-urlencode 'service=ghcr.io' \
                --data-urlencode "scope=repository:${image_path}:pull" \
                https://ghcr.io/token | \
                jq --exit-status --raw-output '.token // .access_token'
            )"
            [[ "$registry_token" =~ ^[A-Za-z0-9._~+/=-]+$ ]]
            install -m 0600 /dev/null "$registry_config"
            printf 'header = "Authorization: Bearer %s"\n' \
              "$registry_token" >"$registry_config"
            unset registry_token
          }

          tag_digest() {
            local repository="$1"
            local image_path="${repository#ghcr.io/}"
            local status digest
            configure_registry_auth "$image_path"
            install -m 0600 /dev/null "$headers_file"
            status="$(
              curl --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --config "$registry_config" \
                --head \
                --header "Accept: $manifest_accept" \
                --dump-header "$headers_file" \
                --output /dev/null \
                --write-out '%{http_code}' \
                "https://ghcr.io/v2/${image_path}/manifests/${VERSION}"
            )"
            case "$status" in
              200)
                digest="$(
                  awk '
                    tolower($1) == "docker-content-digest:" {
                      gsub("\\r", "", $2)
                      print $2
                    }
                  ' "$headers_file"
                )"
                [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
                printf '%s\n' "$digest"
                ;;
              404)
                return 4
                ;;
              *)
                printf 'Unexpected registry status %s for %s:%s\n' \
                  "$status" "$repository" "$VERSION" >&2
                return 1
                ;;
            esac
          }

          preflight() {
            local repository="$1"
            local exact_ref="$2"
            local expected_digest="${exact_ref##*@}"
            local actual_digest status
            [[ "$exact_ref" == "$repository@sha256:"* ]]
            [[ "$expected_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            if actual_digest="$(tag_digest "$repository")"; then
              if [[ "$actual_digest" != "$expected_digest" ]]; then
                printf 'Preflight refuses %s:%s (%s, expected %s)\n' \
                  "$repository" "$VERSION" \
                  "$actual_digest" "$expected_digest" >&2
                return 1
              fi
            else
              status=$?
              [[ "$status" -eq 4 ]] || return "$status"
            fi
          }

          promote() {
            local repository="$1"
            local exact_ref="$2"
            local expected_digest="${exact_ref##*@}"
            local release_tag="$repository:$VERSION"
            local actual_digest status
            [[ "$exact_ref" == "$repository@sha256:"* ]]
            [[ "$expected_digest" =~ ^sha256:[0-9a-f]{64}$ ]]

            # Re-read after the all-repository preflight and immediately before
            # this repository's possible write.
            if actual_digest="$(tag_digest "$repository")"; then
              if [[ "$actual_digest" == "$expected_digest" ]]; then
                printf 'Release tag already has the verified digest: %s\n' \
                  "$release_tag"
                return 0
              fi
              printf 'Refusing to replace %s (%s, expected %s)\n' \
                "$release_tag" "$actual_digest" "$expected_digest" >&2
              return 1
            else
              status=$?
              [[ "$status" -eq 4 ]] || return "$status"
            fi

            # GHCR exposes no client-side atomic compare-and-swap here. The
            # re-read narrows, but cannot eliminate, an external-writer race.
            docker buildx imagetools create --tag "$release_tag" "$exact_ref"
            actual_digest="$(tag_digest "$repository")"
            if [[ "$actual_digest" != "$expected_digest" ]]; then
              printf 'Post-write verification failed for %s (%s, expected %s)\n' \
                "$release_tag" "$actual_digest" "$expected_digest" >&2
              return 1
            fi
          }

          preflight "$BACKEND_REPOSITORY" "$BACKEND_REF"
          preflight "$POSTGRES_REPOSITORY" "$POSTGRES_REF"
          preflight "$MINIO_REPOSITORY" "$MINIO_REF"
          preflight "$MINIO_MC_REPOSITORY" "$MINIO_MC_REF"
          promote "$BACKEND_REPOSITORY" "$BACKEND_REF"
          promote "$POSTGRES_REPOSITORY" "$POSTGRES_REF"
          promote "$MINIO_REPOSITORY" "$MINIO_REF"
          promote "$MINIO_MC_REPOSITORY" "$MINIO_MC_REF"

          {
            printf '### Version-tag promotion\n\n'
            printf 'Deployment identity is the verified repository@sha256 reference, never the mutable version tag.\n\n'
            printf 'GHCR has no client-side atomic tag compare-and-swap; an external writer can still race the pre-write check or mutate a tag after post-write verification.\n'
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Create verified release manifest
        env:
          PROMOTION_REVERIFIED: ${{ steps.reverify.outputs.verified }}
          COSIGN_NEGATIVE_FIXTURES_REVERIFIED: ${{ steps.reverify.outputs.negative_fixtures_verified }}
          POSTAPPROVAL_TRIVY_VERIFIED: ${{ steps.post_trivy.outputs.verified }}
          POSTAPPROVAL_TRIVY_IDENTITY_SHA256: ${{ steps.post_trivy.outputs.identity_sha256 }}
          POSTAPPROVAL_TRIVY_EVIDENCE_SHA256: ${{ steps.post_trivy.outputs.evidence_sha256 }}
          POSTAPPROVAL_TRIVY_DATABASE_SHA256: ${{ steps.post_trivy.outputs.database_sha256 }}
          POSTAPPROVAL_TRIVY_DATABASE_UPDATED_AT: ${{ steps.post_trivy.outputs.database_updated_at }}
          POSTAPPROVAL_TRIVY_SCAN_FINISHED_AT: ${{ steps.post_trivy.outputs.scan_finished_at }}
          CVE_ACCEPTANCE_SHA256: ${{ steps.post_trivy.outputs.acceptance_sha256 }}
          CVE_ACCEPTANCE_COUNT: ${{ steps.post_trivy.outputs.acceptance_count }}
          CVE_ACCEPTANCE_EVIDENCE_BASE64: ${{ steps.post_trivy.outputs.acceptance_evidence_base64 }}
          POSTAPPROVAL_TRIVY_ARTIFACT_DIGEST: ${{ steps.post_trivy_artifact.outputs.artifact-digest }}
          PRODUCTION_ENVIRONMENT_VERIFIED: ${{ steps.environment.outputs.verified }}
          PRODUCTION_ENVIRONMENT_ID: ${{ steps.environment.outputs.environment_id }}
          PRODUCTION_ENVIRONMENT_UPDATED_AT: ${{ steps.environment.outputs.environment_updated_at }}
          PRODUCTION_ENVIRONMENT_REQUIRED_REVIEWER_COUNT: ${{ steps.environment.outputs.required_reviewer_count }}
          PRODUCTION_ENVIRONMENT_APPROVAL_COUNT: ${{ steps.environment.outputs.approval_count }}
          PRODUCTION_ENVIRONMENT_PREVENT_SELF_REVIEW: ${{ steps.environment.outputs.prevent_self_review }}
          PRODUCTION_ENVIRONMENT_ADMIN_BYPASS: ${{ steps.environment.outputs.admin_bypass }}
          PRODUCTION_ENVIRONMENT_DEPLOYMENT_POLICIES: ${{ steps.environment.outputs.deployment_policies }}
          PRODUCTION_ENVIRONMENT_REVIEWER_POLICY_SHA256: ${{ steps.environment.outputs.reviewer_policy_sha256 }}
          PRODUCTION_ENVIRONMENT_EVIDENCE_SHA256: ${{ steps.environment.outputs.evidence_sha256 }}
          PRODUCTION_ENVIRONMENT_EVIDENCE_BASE64: ${{ steps.environment.outputs.evidence_base64 }}
          RELEASE_BUILDX_VERSION: ${{ needs.publish.outputs.buildx-version }}
          RELEASE_BUILDX_BINARY_SHA256: ${{ needs.publish.outputs.buildx-binary-sha256 }}
          RELEASE_BUILDX_HOST_PLATFORM: ${{ needs.publish.outputs.buildx-host-platform }}
          RELEASE_BUILDKIT_IMAGE: ${{ needs.publish.outputs.buildkit-image }}
          APPROVED_BUILDX_VERSION: ${{ steps.buildx.outputs.version }}
          APPROVED_BUILDX_BINARY_SHA256: ${{ steps.buildx.outputs.binary_sha256 }}
          APPROVED_BUILDX_HOST_PLATFORM: ${{ steps.buildx.outputs.architecture }}
          APPROVED_BUILDKIT_IMAGE: ${{ steps.buildx.outputs.buildkit_image }}
        run: |
          set -euo pipefail
          [[ "$AMD64_GATE_APPROVED" == true ]]
          [[ "$ARM64_GATE_APPROVED" == true ]]
          [[ "$BUILDKIT_SBOM_VERIFIED" == true ]]
          [[ "$BUILDKIT_PROVENANCE_VERIFIED" == true ]]
          [[ "$GITHUB_PROVENANCE_VERIFIED" == true ]]
          [[ "$REPRODUCIBILITY_VERIFIED" == true ]]
          [[ "$SIGNATURES_VERIFIED" == true ]]
          [[ "$COSIGN_NEGATIVE_FIXTURES_VERIFIED" == true ]]
          [[ "$COSIGN_NEGATIVE_FIXTURES_REVERIFIED" == true ]]
          [[ "$PROMOTION_REVERIFIED" == true ]]
          [[ "$POSTAPPROVAL_TRIVY_VERIFIED" == true ]]
          [[ "$PRODUCTION_ENVIRONMENT_VERIFIED" == true ]]
          [[ "$PRODUCTION_ENVIRONMENT_ADMIN_BYPASS" == false ]]
          [[ "$POSTAPPROVAL_TRIVY_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$SOURCE_CI_WORKFLOW_SHA" == "$GITHUB_SHA" ]]
          [[ "$SOURCE_CI_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          install -d -m 0700 release-manifest
          {
            printf 'backend=%s\n' "$BACKEND_REF"
            printf 'postgres=%s\n' "$POSTGRES_REF"
            printf 'minio=%s\n' "$MINIO_REF"
            printf 'minio_mc=%s\n' "$MINIO_MC_REF"
          } >release-manifest/images.env
          {
            printf 'source_commit=%s\n' "$GITHUB_SHA"
            printf 'version=%s\n' "$VERSION"
            printf 'verification_run=%s/actions/runs/%s\n' \
              "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf 'verification_run_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } >release-manifest/release.env
          install -m 0555 backend/scripts/workflow-compose-release.sh \
            release-manifest/verify-compose-release.sh
          bash release-manifest/verify-compose-release.sh create \
            release-manifest \
            docker-compose.backend.yml \
            release-manifest/images.env
          compose_file_sha256="sha256:$(sha256sum \
            release-manifest/docker-compose.backend.yml | awk '{print $1}')"
          compose_contract_env_sha256="sha256:$(sha256sum \
            release-manifest/compose-contract.env | awk '{print $1}')"
          compose_config_sha256="sha256:$(sha256sum \
            release-manifest/compose-config.json | awk '{print $1}')"
          compose_verifier_sha256="sha256:$(sha256sum \
            release-manifest/verify-compose-release.sh | awk '{print $1}')"
          compose_version="$(docker compose version --short)"
          [[ "$compose_version" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9._-]+)?$ ]]
          for digest in \
            "$compose_file_sha256" \
            "$compose_contract_env_sha256" \
            "$compose_config_sha256" \
            "$compose_verifier_sha256"
          do
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          done
          test "$APPROVED_BUILDX_VERSION" = "$RELEASE_BUILDX_VERSION"
          test "$APPROVED_BUILDX_BINARY_SHA256" = \
            "$RELEASE_BUILDX_BINARY_SHA256"
          test "$APPROVED_BUILDX_HOST_PLATFORM" = \
            "$RELEASE_BUILDX_HOST_PLATFORM"
          test "$APPROVED_BUILDKIT_IMAGE" = "$RELEASE_BUILDKIT_IMAGE"
          {
            printf 'amd64_gate_job=verify-published\n'
            printf 'amd64_gate_approved=%s\n' "$AMD64_GATE_APPROVED"
            printf 'arm64_gate_job=verify-published-arm64\n'
            printf 'arm64_gate_approved=%s\n' "$ARM64_GATE_APPROVED"
            printf 'source_ci_run=%s\n' "$SOURCE_CI_RUN"
            printf 'source_ci_run_attempt=%s\n' "$SOURCE_CI_RUN_ATTEMPT"
            printf 'source_ci_workflow_ref=%s\n' "$SOURCE_CI_WORKFLOW_REF"
            printf 'source_ci_workflow_sha=%s\n' "$SOURCE_CI_WORKFLOW_SHA"
            printf 'release_source_ref=%s\n' "$GITHUB_REF"
            printf 'release_signer_workflow_ref=%s\n' "$GITHUB_WORKFLOW_REF"
            printf 'release_signer_workflow_sha=%s\n' "$GITHUB_SHA"
            printf 'release_signer_event=%s\n' "$GITHUB_EVENT_NAME"
            printf 'release_security_external_assumption=%s\n' \
              'repository-and-workflow-writers-trusted-and-restricted'
            printf 'buildkit_attestation_platforms=linux/amd64,linux/arm64\n'
            printf 'buildx_repository=https://github.com/docker/buildx\n'
            printf 'buildx_version=%s\n' "$RELEASE_BUILDX_VERSION"
            printf 'buildx_binary_sha256=%s\n' \
              "$RELEASE_BUILDX_BINARY_SHA256"
            printf 'buildx_host_platform=%s\n' "$RELEASE_BUILDX_HOST_PLATFORM"
            printf 'buildx_independent_rebuild_tooling_verified=true\n'
            printf 'buildx_postapproval_tooling_verified=true\n'
            printf 'buildkit_image=%s\n' "$RELEASE_BUILDKIT_IMAGE"
            printf 'buildkit_sbom_generator=%s\n' "$SBOM_GENERATOR"
            printf 'buildkit_sbom_verified=%s\n' "$BUILDKIT_SBOM_VERIFIED"
            printf 'buildkit_provenance_verified=%s\n' \
              "$BUILDKIT_PROVENANCE_VERIFIED"
            printf 'github_build_provenance_verified=%s\n' \
              "$GITHUB_PROVENANCE_VERIFIED"
            printf 'reproducibility_platforms=linux/amd64,linux/arm64\n'
            printf 'reproducibility_verified=%s\n' "$REPRODUCIBILITY_VERIFIED"
            printf 'trivy_scanner_image=%s\n' "$TRIVY_IMAGE"
            printf 'trivy_scanner_version=%s\n' "$TRIVY_VERSION"
            printf 'trivy_image_source=remote\n'
            printf 'trivy_registry_auth=per-repository-pull-only-bearer\n'
            printf 'trivy_host_docker_config_mounted=false\n'
            printf 'trivy_scan_platforms=linux/amd64,linux/arm64\n'
            printf 'trivy_db_max_age_seconds=86400\n'
            printf 'trivy_preapproval_amd64_identity_sha256=%s\n' \
              "$PREAPPROVAL_AMD64_IDENTITY_SHA256"
            printf 'trivy_preapproval_amd64_artifact_name=%s\n' \
              "backend-release-security-$VERSION-$GITHUB_RUN_ATTEMPT"
            printf 'trivy_preapproval_amd64_evidence_sha256=%s\n' \
              "$PREAPPROVAL_AMD64_EVIDENCE_SHA256"
            printf 'trivy_preapproval_amd64_scan_finished_epoch=%s\n' \
              "$PREAPPROVAL_AMD64_FINISHED_EPOCH"
            printf 'trivy_preapproval_arm64_identity_sha256=%s\n' \
              "$PREAPPROVAL_ARM64_IDENTITY_SHA256"
            printf 'trivy_preapproval_arm64_artifact_name=%s\n' \
              "backend-release-security-arm64-$VERSION-$GITHUB_RUN_ATTEMPT"
            printf 'trivy_preapproval_arm64_evidence_sha256=%s\n' \
              "$PREAPPROVAL_ARM64_EVIDENCE_SHA256"
            printf 'trivy_preapproval_arm64_scan_finished_epoch=%s\n' \
              "$PREAPPROVAL_ARM64_FINISHED_EPOCH"
            printf 'trivy_postapproval_verified=%s\n' \
              "$POSTAPPROVAL_TRIVY_VERIFIED"
            printf 'trivy_postapproval_identity_sha256=%s\n' \
              "$POSTAPPROVAL_TRIVY_IDENTITY_SHA256"
            printf 'trivy_postapproval_evidence_sha256=%s\n' \
              "$POSTAPPROVAL_TRIVY_EVIDENCE_SHA256"
            printf 'trivy_postapproval_database_sha256=%s\n' \
              "$POSTAPPROVAL_TRIVY_DATABASE_SHA256"
            printf 'trivy_postapproval_database_updated_at=%s\n' \
              "$POSTAPPROVAL_TRIVY_DATABASE_UPDATED_AT"
            printf 'trivy_postapproval_scan_finished_at=%s\n' \
              "$POSTAPPROVAL_TRIVY_SCAN_FINISHED_AT"
            printf 'trivy_postapproval_artifact_name=%s\n' \
              "backend-release-postapproval-security-$VERSION-$GITHUB_RUN_ATTEMPT"
            printf 'trivy_postapproval_artifact_digest=sha256:%s\n' \
              "$POSTAPPROVAL_TRIVY_ARTIFACT_DIGEST"
            printf 'cve_acceptance_contract_schema=emfont.cve-acceptance-contract/v1\n'
            printf 'cve_acceptance_document_schema=emfont.cve-acceptance/v1\n'
            printf 'cve_acceptance_source=%s\n' \
              'github-environment-variable:backend-production/EMFONT_CVE_ACCEPTANCE_B64'
            printf 'cve_acceptance_sha256=%s\n' "$CVE_ACCEPTANCE_SHA256"
            printf 'cve_acceptance_count=%s\n' "$CVE_ACCEPTANCE_COUNT"
            printf 'cve_acceptance_evidence_base64=%s\n' \
              "$CVE_ACCEPTANCE_EVIDENCE_BASE64"
            printf 'deployment_identity=repository@sha256\n'
            printf 'compose_file=docker-compose.backend.yml\n'
            printf 'compose_file_sha256=%s\n' "$compose_file_sha256"
            printf 'compose_contract_env=compose-contract.env\n'
            printf 'compose_contract_env_sha256=%s\n' \
              "$compose_contract_env_sha256"
            printf 'compose_config=compose-config.json\n'
            printf 'compose_config_sha256=%s\n' "$compose_config_sha256"
            printf 'compose_generator_version=%s\n' "$compose_version"
            printf 'compose_verifier=verify-compose-release.sh\n'
            printf 'compose_verifier_sha256=%s\n' "$compose_verifier_sha256"
            printf 'compose_contract_verified=true\n'
            printf 'compose_verification_required_for_deploy=true\n'
            printf 'compose_verification_required_for_rollback=true\n'
            printf 'compose_verification_command=%s\n' \
              'bash verify-compose-release.sh verify . images.env'
            printf 'version_tag_is_deployment_identity=false\n'
            printf 'version_tag_atomic_compare_and_swap=false\n'
            printf 'external_writer_toctou_eliminated=false\n'
            printf 'promotion_environment=backend-production\n'
            printf 'promotion_environment_verified=%s\n' \
              "$PRODUCTION_ENVIRONMENT_VERIFIED"
            printf 'promotion_environment_id=%s\n' \
              "$PRODUCTION_ENVIRONMENT_ID"
            printf 'promotion_environment_updated_at=%s\n' \
              "$PRODUCTION_ENVIRONMENT_UPDATED_AT"
            printf 'promotion_environment_required_reviewer_count=%s\n' \
              "$PRODUCTION_ENVIRONMENT_REQUIRED_REVIEWER_COUNT"
            printf 'promotion_environment_approval_count=%s\n' \
              "$PRODUCTION_ENVIRONMENT_APPROVAL_COUNT"
            printf 'promotion_environment_prevent_self_review=%s\n' \
              "$PRODUCTION_ENVIRONMENT_PREVENT_SELF_REVIEW"
            printf 'promotion_environment_admin_bypass=%s\n' \
              "$PRODUCTION_ENVIRONMENT_ADMIN_BYPASS"
            printf 'promotion_environment_deployment_policies=%s\n' \
              "$PRODUCTION_ENVIRONMENT_DEPLOYMENT_POLICIES"
            printf 'promotion_environment_reviewer_policy_sha256=%s\n' \
              "$PRODUCTION_ENVIRONMENT_REVIEWER_POLICY_SHA256"
            printf 'promotion_environment_evidence_sha256=%s\n' \
              "$PRODUCTION_ENVIRONMENT_EVIDENCE_SHA256"
            printf 'promotion_environment_evidence_base64=%s\n' \
              "$PRODUCTION_ENVIRONMENT_EVIDENCE_BASE64"
            printf 'minio_security_labels_verified_platforms=linux/amd64,linux/arm64\n'
            printf 'cosign_signature_job=sign-approved\n'
            printf 'cosign_signature_stage=after-platform-gates\n'
            printf 'cosign_signed_references=backend,postgres,minio,minio_mc\n'
            printf 'cosign_signatures_verified=%s\n' "$SIGNATURES_VERIFIED"
            printf 'cosign_negative_fixtures_verified=%s\n' \
              "$COSIGN_NEGATIVE_FIXTURES_VERIFIED"
            printf 'cosign_signatures_reverified_after_approval=%s\n' \
              "$PROMOTION_REVERIFIED"
            printf 'cosign_negative_fixtures_reverified_after_approval=%s\n' \
              "$COSIGN_NEGATIVE_FIXTURES_REVERIFIED"
            printf 'cosign_certificate_identity=%s\n' "$CERTIFICATE_IDENTITY"
            printf 'cosign_certificate_oidc_issuer=%s\n' \
              'https://token.actions.githubusercontent.com'
            printf 'github_attestations_reverified_after_approval=%s\n' \
              "$PROMOTION_REVERIFIED"
            printf 'registry_referrers_reverified_after_approval=%s\n' \
              "$PROMOTION_REVERIFIED"
            printf 'promotion_reverification_verified=%s\n' \
              "$PROMOTION_REVERIFIED"
          } >release-manifest/verification.env
          bash release-manifest/verify-compose-release.sh verify \
            release-manifest release-manifest/images.env
          sha256sum \
            release-manifest/compose-config.json \
            release-manifest/compose-contract.env \
            release-manifest/docker-compose.backend.yml \
            release-manifest/images.env \
            release-manifest/release.env \
            release-manifest/verification.env \
            release-manifest/verify-compose-release.sh \
            >release-manifest/SHA256SUMS

          manifest_value() {
            local key="$1"
            local file="$2"
            local values=()
            mapfile -t values < <(awk -F= -v key="$key" '$1 == key {
              sub(/^[^=]*=/, "")
              print
            }' "$file")
            ((${#values[@]} == 1))
            [[ -n "${values[0]}" ]]
            printf '%s' "${values[0]}"
          }

          validate_env_keys() {
            local file="$1"
            local expected="$2"
            local actual
            actual="$(awk -F= '
              /^[A-Za-z_][A-Za-z0-9_]*=/ { print $1; next }
              { exit 2 }
            ' "$file" | LC_ALL=C sort)"
            [[ "$actual" == "$expected" ]]
            [[ "$(printf '%s\n' "$actual" | uniq --repeated)" == '' ]]
          }

          expected_files=$'SHA256SUMS\ncompose-config.json\ncompose-contract.env\ndocker-compose.backend.yml\nimages.env\nrelease.env\nverification.env\nverify-compose-release.sh'
          actual_files="$(find release-manifest -mindepth 1 -maxdepth 1 \
            -type f -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual_files" == "$expected_files" ]]
          [[ -z "$(find release-manifest -mindepth 1 -maxdepth 1 \
            ! -type f -print -quit)" ]]

          expected_image_keys=$'backend\nminio\nminio_mc\npostgres'
          expected_release_keys=$'source_commit\nverification_run\nverification_run_attempt\nversion'
          expected_verification_keys="$(printf '%s\n' \
            amd64_gate_approved \
            amd64_gate_job \
            arm64_gate_approved \
            arm64_gate_job \
            buildkit_attestation_platforms \
            buildkit_image \
            buildkit_provenance_verified \
            buildkit_sbom_generator \
            buildkit_sbom_verified \
            buildx_binary_sha256 \
            buildx_host_platform \
            buildx_independent_rebuild_tooling_verified \
            buildx_postapproval_tooling_verified \
            buildx_repository \
            buildx_version \
            compose_config \
            compose_config_sha256 \
            compose_contract_env \
            compose_contract_env_sha256 \
            compose_contract_verified \
            compose_file \
            compose_file_sha256 \
            compose_generator_version \
            compose_verification_command \
            compose_verification_required_for_deploy \
            compose_verification_required_for_rollback \
            compose_verifier \
            compose_verifier_sha256 \
            cve_acceptance_contract_schema \
            cve_acceptance_count \
            cve_acceptance_document_schema \
            cve_acceptance_evidence_base64 \
            cve_acceptance_sha256 \
            cve_acceptance_source \
            cosign_negative_fixtures_reverified_after_approval \
            cosign_negative_fixtures_verified \
            cosign_certificate_identity \
            cosign_certificate_oidc_issuer \
            cosign_signature_job \
            cosign_signature_stage \
            cosign_signatures_reverified_after_approval \
            cosign_signatures_verified \
            cosign_signed_references \
            deployment_identity \
            external_writer_toctou_eliminated \
            github_attestations_reverified_after_approval \
            github_build_provenance_verified \
            minio_security_labels_verified_platforms \
            promotion_environment \
            promotion_environment_admin_bypass \
            promotion_environment_approval_count \
            promotion_environment_deployment_policies \
            promotion_environment_evidence_base64 \
            promotion_environment_evidence_sha256 \
            promotion_environment_id \
            promotion_environment_prevent_self_review \
            promotion_environment_required_reviewer_count \
            promotion_environment_reviewer_policy_sha256 \
            promotion_environment_updated_at \
            promotion_environment_verified \
            promotion_reverification_verified \
            registry_referrers_reverified_after_approval \
            release_signer_event \
            release_signer_workflow_ref \
            release_signer_workflow_sha \
            release_security_external_assumption \
            release_source_ref \
            reproducibility_platforms \
            reproducibility_verified \
            source_ci_run \
            source_ci_run_attempt \
            source_ci_workflow_ref \
            source_ci_workflow_sha \
            trivy_db_max_age_seconds \
            trivy_image_source \
            trivy_host_docker_config_mounted \
            trivy_postapproval_artifact_digest \
            trivy_postapproval_artifact_name \
            trivy_postapproval_database_sha256 \
            trivy_postapproval_database_updated_at \
            trivy_postapproval_evidence_sha256 \
            trivy_postapproval_identity_sha256 \
            trivy_postapproval_scan_finished_at \
            trivy_postapproval_verified \
            trivy_preapproval_amd64_artifact_name \
            trivy_preapproval_amd64_evidence_sha256 \
            trivy_preapproval_amd64_identity_sha256 \
            trivy_preapproval_amd64_scan_finished_epoch \
            trivy_preapproval_arm64_artifact_name \
            trivy_preapproval_arm64_evidence_sha256 \
            trivy_preapproval_arm64_identity_sha256 \
            trivy_preapproval_arm64_scan_finished_epoch \
            trivy_scan_platforms \
            trivy_registry_auth \
            trivy_scanner_image \
            trivy_scanner_version \
            version_tag_atomic_compare_and_swap \
            version_tag_is_deployment_identity | LC_ALL=C sort)"
          validate_env_keys release-manifest/images.env "$expected_image_keys"
          validate_env_keys release-manifest/release.env "$expected_release_keys"
          validate_env_keys \
            release-manifest/verification.env "$expected_verification_keys"

          for image_spec in \
            "backend|$BACKEND_REPOSITORY" \
            "postgres|$POSTGRES_REPOSITORY" \
            "minio|$MINIO_REPOSITORY" \
            "minio_mc|$MINIO_MC_REPOSITORY"
          do
            IFS='|' read -r key repository <<<"$image_spec"
            reference="$(manifest_value "$key" release-manifest/images.env)"
            [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
            [[ "${reference%@*}" == "$repository" ]]
          done
          [[ "$(manifest_value source_commit release-manifest/release.env)" == \
            "$GITHUB_SHA" ]]
          [[ "$(manifest_value version release-manifest/release.env)" == \
            "$VERSION" ]]
          [[ "$(manifest_value verification_run release-manifest/release.env)" == \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" ]]
          [[ "$(manifest_value verification_run_attempt release-manifest/release.env)" == \
            "$GITHUB_RUN_ATTEMPT" ]]
          [[ "$(manifest_value source_ci_run release-manifest/verification.env)" == \
            "$SOURCE_CI_RUN" ]]
          [[ "$(manifest_value source_ci_run_attempt release-manifest/verification.env)" == \
            "$SOURCE_CI_RUN_ATTEMPT" ]]
          [[ "$(manifest_value source_ci_workflow_ref release-manifest/verification.env)" == \
            "$SOURCE_CI_WORKFLOW_REF" ]]
          [[ "$(manifest_value source_ci_workflow_sha release-manifest/verification.env)" == \
            "$GITHUB_SHA" ]]
          [[ "$(manifest_value release_source_ref release-manifest/verification.env)" == \
            "$GITHUB_REF" ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]
          [[ "$(manifest_value release_signer_event release-manifest/verification.env)" == \
            workflow_dispatch ]]
          [[ "$(manifest_value release_signer_workflow_sha release-manifest/verification.env)" == \
            "$GITHUB_SHA" ]]
          [[ "$(manifest_value release_signer_workflow_ref release-manifest/verification.env)" == \
            "$GITHUB_WORKFLOW_REF" ]]
          [[ "$(manifest_value cosign_certificate_identity release-manifest/verification.env)" == \
            "$CERTIFICATE_IDENTITY" ]]
          [[ "$CERTIFICATE_IDENTITY" == \
            "https://github.com/$GITHUB_WORKFLOW_REF" ]]
          for boolean_key in \
            amd64_gate_approved \
            arm64_gate_approved \
            buildkit_provenance_verified \
            buildkit_sbom_verified \
            buildx_independent_rebuild_tooling_verified \
            buildx_postapproval_tooling_verified \
            compose_contract_verified \
            compose_verification_required_for_deploy \
            compose_verification_required_for_rollback \
            cosign_negative_fixtures_reverified_after_approval \
            cosign_negative_fixtures_verified \
            cosign_signatures_reverified_after_approval \
            cosign_signatures_verified \
            github_attestations_reverified_after_approval \
            github_build_provenance_verified \
            promotion_environment_prevent_self_review \
            promotion_environment_verified \
            promotion_reverification_verified \
            registry_referrers_reverified_after_approval \
            reproducibility_verified \
            trivy_postapproval_verified
          do
            [[ "$(manifest_value "$boolean_key" \
              release-manifest/verification.env)" == true ]]
          done
          [[ "$(manifest_value promotion_environment_admin_bypass \
            release-manifest/verification.env)" == false ]]
          [[ "$(manifest_value trivy_host_docker_config_mounted \
            release-manifest/verification.env)" == false ]]
          [[ "$(manifest_value buildx_repository \
            release-manifest/verification.env)" == \
            https://github.com/docker/buildx ]]
          [[ "$(manifest_value buildx_version \
            release-manifest/verification.env)" == v0.35.0 ]]
          [[ "$(manifest_value buildx_binary_sha256 \
            release-manifest/verification.env)" == \
            "$RELEASE_BUILDX_BINARY_SHA256" ]]
          [[ "$(manifest_value buildx_host_platform \
            release-manifest/verification.env)" == linux/amd64 ]]
          [[ "$(manifest_value buildkit_image \
            release-manifest/verification.env)" == \
            'moby/buildkit:v0.31.0@sha256:a095b3d11ce1a9a05b6064ef515dfca0291ec5bcf2ea8178da8f6461924294e1' ]]

          [[ "$(manifest_value compose_file \
            release-manifest/verification.env)" == docker-compose.backend.yml ]]
          [[ "$(manifest_value compose_contract_env \
            release-manifest/verification.env)" == compose-contract.env ]]
          [[ "$(manifest_value compose_config \
            release-manifest/verification.env)" == compose-config.json ]]
          [[ "$(manifest_value compose_verifier \
            release-manifest/verification.env)" == verify-compose-release.sh ]]
          [[ "$(manifest_value compose_verification_command \
            release-manifest/verification.env)" == \
            'bash verify-compose-release.sh verify . images.env' ]]
          [[ "$(manifest_value compose_file_sha256 \
            release-manifest/verification.env)" == \
            "sha256:$(sha256sum release-manifest/docker-compose.backend.yml | awk '{print $1}')" ]]
          [[ "$(manifest_value compose_contract_env_sha256 \
            release-manifest/verification.env)" == \
            "sha256:$(sha256sum release-manifest/compose-contract.env | awk '{print $1}')" ]]
          [[ "$(manifest_value compose_config_sha256 \
            release-manifest/verification.env)" == \
            "sha256:$(sha256sum release-manifest/compose-config.json | awk '{print $1}')" ]]
          [[ "$(manifest_value compose_verifier_sha256 \
            release-manifest/verification.env)" == \
            "sha256:$(sha256sum release-manifest/verify-compose-release.sh | awk '{print $1}')" ]]
          [[ "$(manifest_value compose_generator_version \
            release-manifest/verification.env)" == "$compose_version" ]]
          cmp --silent docker-compose.backend.yml \
            release-manifest/docker-compose.backend.yml
          bash release-manifest/verify-compose-release.sh verify \
            release-manifest release-manifest/images.env

          for digest_key in \
            promotion_environment_evidence_sha256 \
            promotion_environment_reviewer_policy_sha256 \
            trivy_postapproval_artifact_digest \
            trivy_postapproval_database_sha256 \
            trivy_postapproval_evidence_sha256 \
            trivy_postapproval_identity_sha256 \
            trivy_preapproval_amd64_evidence_sha256 \
            trivy_preapproval_amd64_identity_sha256 \
            trivy_preapproval_arm64_evidence_sha256 \
            trivy_preapproval_arm64_identity_sha256
          do
            [[ "$(manifest_value "$digest_key" \
              release-manifest/verification.env)" =~ ^sha256:[0-9a-f]{64}$ ]]
          done
          [[ "$(manifest_value trivy_db_max_age_seconds \
            release-manifest/verification.env)" == 86400 ]]
          [[ "$(manifest_value trivy_registry_auth \
            release-manifest/verification.env)" == \
            per-repository-pull-only-bearer ]]
          [[ "$(manifest_value release_security_external_assumption \
            release-manifest/verification.env)" == \
            repository-and-workflow-writers-trusted-and-restricted ]]
          [[ "$(manifest_value trivy_postapproval_artifact_name \
            release-manifest/verification.env)" == \
            "backend-release-postapproval-security-$VERSION-$GITHUB_RUN_ATTEMPT" ]]
          [[ "$(manifest_value trivy_preapproval_amd64_artifact_name \
            release-manifest/verification.env)" == \
            "backend-release-security-$VERSION-$GITHUB_RUN_ATTEMPT" ]]
          [[ "$(manifest_value trivy_preapproval_arm64_artifact_name \
            release-manifest/verification.env)" == \
            "backend-release-security-arm64-$VERSION-$GITHUB_RUN_ATTEMPT" ]]
          [[ "$(manifest_value promotion_environment \
            release-manifest/verification.env)" == backend-production ]]
          [[ "$(manifest_value promotion_environment_deployment_policies \
            release-manifest/verification.env)" == \
            branch:main ]]
          [[ "$(manifest_value promotion_environment_id \
            release-manifest/verification.env)" =~ ^[1-9][0-9]*$ ]]
          [[ "$(manifest_value promotion_environment_required_reviewer_count \
            release-manifest/verification.env)" =~ ^[1-6]$ ]]
          [[ "$(manifest_value promotion_environment_approval_count \
            release-manifest/verification.env)" =~ ^[1-9][0-9]*$ ]]
          [[ "$(manifest_value trivy_preapproval_amd64_scan_finished_epoch \
            release-manifest/verification.env)" =~ ^[1-9][0-9]*$ ]]
          [[ "$(manifest_value trivy_preapproval_arm64_scan_finished_epoch \
            release-manifest/verification.env)" =~ ^[1-9][0-9]*$ ]]
          [[ "$(manifest_value cve_acceptance_contract_schema \
            release-manifest/verification.env)" == \
            emfont.cve-acceptance-contract/v1 ]]
          [[ "$(manifest_value cve_acceptance_document_schema \
            release-manifest/verification.env)" == \
            emfont.cve-acceptance/v1 ]]
          [[ "$(manifest_value cve_acceptance_source \
            release-manifest/verification.env)" == \
            github-environment-variable:backend-production/EMFONT_CVE_ACCEPTANCE_B64 ]]

          acceptance_count="$(manifest_value cve_acceptance_count \
            release-manifest/verification.env)"
          [[ "$acceptance_count" =~ ^[0-9]+$ ]]
          acceptance_sha256="$(manifest_value cve_acceptance_sha256 \
            release-manifest/verification.env)"
          acceptance_base64="$(manifest_value cve_acceptance_evidence_base64 \
            release-manifest/verification.env)"
          if ((acceptance_count == 0)); then
            [[ "$acceptance_sha256" == none ]]
            [[ "$acceptance_base64" == none ]]
          else
            [[ "$acceptance_sha256" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$acceptance_base64" =~ ^[A-Za-z0-9+/]*={0,2}$ ]]
            ((${#acceptance_base64} % 4 == 0))
          fi
          approval_comment="emfont-release-approval/v1 source_sha=$GITHUB_SHA run_attempt=$GITHUB_RUN_ATTEMPT cve_acceptance_sha256=$acceptance_sha256"
          reviewer_policy_sha256="$(manifest_value \
            promotion_environment_reviewer_policy_sha256 \
            release-manifest/verification.env)"
          [[ "$reviewer_policy_sha256" =~ ^sha256:[0-9a-f]{64}$ ]]

          environment_evidence="$RUNNER_TEMP/release-environment-evidence.json"
          manifest_value promotion_environment_evidence_base64 \
            release-manifest/verification.env | \
            base64 --decode >"$environment_evidence"
          [[ "sha256:$(sha256sum "$environment_evidence" | awk '{print $1}')" == \
            "$(manifest_value promotion_environment_evidence_sha256 \
              release-manifest/verification.env)" ]]
          jq --exit-status \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg actor "$GITHUB_ACTOR" \
            --arg approval_comment "$approval_comment" \
            --arg acceptance_sha256 "$acceptance_sha256" \
            --arg reviewer_policy_sha256 "$reviewer_policy_sha256" '
            .schema == "emfont.github-environment-policy/v1" and
            .repository == $repository and
            .workflow_run_id == env.GITHUB_RUN_ID and
            .workflow_run_attempt == env.GITHUB_RUN_ATTEMPT and
            .source_sha == env.GITHUB_SHA and
            .source_ref == "refs/heads/main" and
            .approval_contract == {
              schema: "emfont-release-approval/v1",
              comment: $approval_comment,
              source_sha: env.GITHUB_SHA,
              run_attempt: env.GITHUB_RUN_ATTEMPT,
              cve_acceptance_sha256: $acceptance_sha256,
              reviewer_policy_sha256: $reviewer_policy_sha256
            } and
            .environment.name == "backend-production" and
            (has("environment") and
              (.environment | has("can_admins_bypass")) and
              .environment.can_admins_bypass == false) and
            .environment.reviewer_policy.schema ==
              "emfont.reviewer-policy-evidence/v1" and
            (.environment.reviewer_policy | . as $policy |
              .approvals | all(
                (.user.id | type == "number" and . > 0 and floor == .) and
                (. as $approval | $policy.required_reviewers | any(
                  .authorized_users | any(
                    .id == $approval.user.id and
                    .node_id == $approval.user.node_id and
                    ((.login | ascii_downcase) ==
                      ($approval.user.login | ascii_downcase))
                  )
                ))
              )) and
            (.environment.id as $environment_id |
              .environment.approvals | type == "array" and length >= 1 and all(
                .state == "approved" and
                (.user.id | type == "number" and . > 0 and floor == .) and
                (.user.login | type == "string" and
                  test("^[A-Za-z0-9-]{1,39}$")) and
                ((.user.login | ascii_downcase) != ($actor | ascii_downcase)) and
                .comment == $approval_comment and
                (.environments | any(
                  .id == $environment_id and .name == "backend-production"
                ))
              )) and
            ([.environment.protection_rules[] |
              select(.type == "required_reviewers")] as $rules |
              ($rules | length == 1) and
              $rules[0].prevent_self_review == true and
              ($rules[0].reviewers | length >= 1)) and
            .environment.deployment_branch_policy.protected_branches == false and
            .environment.deployment_branch_policy.custom_branch_policies == true and
            [.environment.deployment_policies[] | {name, type}] == [
              {name: "main", type: "branch"}
            ]
          ' "$environment_evidence" >/dev/null

          if ((acceptance_count > 0)); then
            acceptance_evidence="$RUNNER_TEMP/release-cve-acceptance.json"
            printf '%s' "$acceptance_base64" | \
              base64 --decode >"$acceptance_evidence"
            [[ "sha256:$(sha256sum "$acceptance_evidence" | awk '{print $1}')" == \
              "$acceptance_sha256" ]]
            jq --exit-status \
              --arg source_sha "$GITHUB_SHA" \
              --arg actor "$GITHUB_ACTOR" \
              --arg approval_comment "$approval_comment" \
              --argjson count "$acceptance_count" \
              --slurpfile environment "$environment_evidence" '
                (keys == ["acceptances", "schema", "source_sha"]) and
                .schema == "emfont.cve-acceptance/v1" and
                .source_sha == $source_sha and
                (.acceptances | type == "array" and length == $count and all(
                  keys == [
                    "class",
                    "compensating_controls",
                    "component",
                    "expires_at",
                    "fixed_version",
                    "image",
                    "installed_version",
                    "owner",
                    "package",
                    "platform",
                    "rationale",
                    "report_sha256",
                    "security_reviewer",
                    "severity",
                    "source_sha",
                    "status",
                    "target",
                    "ticket",
                    "type",
                    "vulnerability_id"
                  ] and
                  (.compensating_controls | type == "array" and
                    length >= 1 and length <= 8 and all(
                      type == "string" and length >= 10 and length <= 500 and
                      (test("[[:cntrl:]]") | not) and
                      test("[^[:space:]]")
                    ) and (unique | length) == length) and
                  (.security_reviewer | type == "string" and
                    test("^github:user/[A-Za-z0-9-]{1,39}$")) and
                  (.ticket | type == "string" and length >= 3 and length <= 256 and
                    (test("[[:space:]]") | not) and
                    (test("[[:cntrl:]]") | not) and
                    test("[A-Za-z0-9]")) and
                  .source_sha == $source_sha and
                  ((.security_reviewer |
                    ltrimstr("github:user/") | ascii_downcase) as $reviewer |
                    $reviewer != ($actor | ascii_downcase) and
                    ($environment[0].environment.reviewer_policy.approvals | any(
                      ((.user.login | ascii_downcase) == $reviewer) and
                      .comment == $approval_comment
                    )))
                ))
              ' "$acceptance_evidence" >/dev/null
          fi

          expected_sum_paths=$'release-manifest/compose-config.json\nrelease-manifest/compose-contract.env\nrelease-manifest/docker-compose.backend.yml\nrelease-manifest/images.env\nrelease-manifest/release.env\nrelease-manifest/verification.env\nrelease-manifest/verify-compose-release.sh'
          actual_sum_paths="$(awk '{print $2}' release-manifest/SHA256SUMS | \
            LC_ALL=C sort)"
          [[ "$actual_sum_paths" == "$expected_sum_paths" ]]
          sha256sum --check --strict release-manifest/SHA256SUMS

      - name: Upload verified immutable release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-release-${{ needs.publish.outputs.version }}
          path: release-manifest/
          if-no-files-found: error
          retention-days: 90
