name: Backend Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v1.2.3
        required: true
        type: string

# Fail-closed external security boundary: repository and workflow writers must
# be trusted and restricted. Ref-controlled YAML cannot constrain permissions
# requested by a malicious replacement of this workflow.
permissions:
  actions: read
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: backend-release
  cancel-in-progress: false

env:
  BACKEND_REPOSITORY: ghcr.io/yorukot/emfont-backend
  POSTGRES_REPOSITORY: ghcr.io/yorukot/emfont-postgres
  MINIO_REPOSITORY: ghcr.io/yorukot/emfont-minio
  MINIO_MC_REPOSITORY: ghcr.io/yorukot/emfont-minio-mc
  SBOM_GENERATOR: docker/buildkit-syft-scanner:stable-1@sha256:79e7b013cbec16bbb436f312819a49a4a57752b2270c1a9332ae1a10fcc82a68
  TRIVY_IMAGE: aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f
  TRIVY_VERSION: 0.72.0

jobs:
  publish:
    name: Publish unsigned multi-platform candidates
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    outputs:
      backend-ref: ${{ steps.refs.outputs.backend }}
      postgres-ref: ${{ steps.refs.outputs.postgres }}
      minio-ref: ${{ steps.refs.outputs.minio }}
      minio-mc-ref: ${{ steps.refs.outputs.minio_mc }}
      version: ${{ steps.version.outputs.version }}
      source-ci-run: ${{ steps.source.outputs.ci_run }}
      source-ci-run-attempt: ${{ steps.source.outputs.ci_run_attempt }}
      source-ci-workflow-ref: ${{ steps.source.outputs.ci_workflow_ref }}
      source-ci-workflow-sha: ${{ steps.source.outputs.ci_workflow_sha }}
      source-date-epoch: ${{ steps.source.outputs.source_date_epoch }}
      buildx-version: ${{ steps.buildx.outputs.version }}
      buildx-binary-sha256: ${{ steps.buildx.outputs.binary_sha256 }}
      buildx-host-platform: ${{ steps.buildx.outputs.architecture }}
      buildkit-image: ${{ steps.buildx.outputs.buildkit_image }}
    steps:
      - name: Validate release version and invocation ref
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]
          version="$REQUESTED_VERSION"
          [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]
          [[ "$GITHUB_WORKFLOW_REF" == \
            "$GITHUB_REPOSITORY/.github/workflows/backend-release.yml@$GITHUB_REF" ]]
          [[ "$GITHUB_WORKFLOW_SHA" == "$GITHUB_SHA" ]]
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"

      - name: Check out authorized source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Authorize exact protected-main source
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          [[ "$(git rev-parse origin/main)" == "$GITHUB_SHA" ]]
          source_date_epoch="$(git show --no-patch --format=%ct "$GITHUB_SHA")"
          [[ "$source_date_epoch" =~ ^[1-9][0-9]*$ ]]

          runs_json="$RUNNER_TEMP/backend-source-runs.json"
          gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/backend.yml/runs?branch=main&event=push&status=success&head_sha=$GITHUB_SHA&per_page=100" \
            >"$runs_json"
          run_id="$(jq --exit-status --raw-output \
            --arg source_commit "$GITHUB_SHA" '
              [
                .workflow_runs[]
                | select(
                    .conclusion == "success" and
                    .event == "push" and
                    .head_branch == "main" and
                    .head_sha == $source_commit and
                    .path == ".github/workflows/backend.yml"
                  )
              ]
              | sort_by(.id)
              | if length > 0 then last.id else error("no authorized Backend CI run") end
            ' "$runs_json")"
          [[ "$run_id" =~ ^[1-9][0-9]*$ ]]
          run_url="$(jq --exit-status --raw-output \
            --argjson run_id "$run_id" '
              .workflow_runs[] | select(.id == $run_id) | .html_url
            ' "$runs_json")"
          run_attempt="$(jq --exit-status --raw-output \
            --argjson run_id "$run_id" '
              .workflow_runs[] | select(.id == $run_id) | .run_attempt
            ' "$runs_json")"
          [[ "$run_url" == \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$run_id" ]]
          [[ "$run_attempt" =~ ^[1-9][0-9]*$ ]]

          evidence_dir="$RUNNER_TEMP/backend-source-evidence"
          install -d -m 0700 "$evidence_dir"
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "backend-release-source-$GITHUB_SHA" \
            --dir "$evidence_dir"
          actual_files="$(find "$evidence_dir" -mindepth 1 -maxdepth 1 \
            -type f -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual_files" == release-source.env ]]
          [[ -z "$(find "$evidence_dir" -mindepth 1 -maxdepth 1 \
            ! -type f -print -quit)" ]]

          evidence="$evidence_dir/release-source.env"
          expected_keys=$'arm64_runtime_result\ndelivery_result\nquality_result\nrace_result\nsource_commit\nsource_ref\nsqlc_result\nunit_result\nworkflow_ref\nworkflow_run\nworkflow_run_attempt\nworkflow_sha'
          actual_keys="$(awk -F= '
            /^[A-Za-z_][A-Za-z0-9_]*=/ { print $1; next }
            { exit 2 }
          ' "$evidence" | LC_ALL=C sort)"
          [[ "$actual_keys" == "$expected_keys" ]]

          evidence_value() {
            local key="$1"
            local values=()
            mapfile -t values < <(awk -F= -v key="$key" '$1 == key {
              sub(/^[^=]*=/, "")
              print
            }' "$evidence")
            ((${#values[@]} == 1))
            [[ -n "${values[0]}" ]]
            printf '%s' "${values[0]}"
          }

          [[ "$(evidence_value source_commit)" == "$GITHUB_SHA" ]]
          [[ "$(evidence_value source_ref)" == refs/heads/main ]]
          expected_workflow_ref="$GITHUB_REPOSITORY/.github/workflows/backend.yml@refs/heads/main"
          [[ "$(evidence_value workflow_ref)" == "$expected_workflow_ref" ]]
          [[ "$(evidence_value workflow_sha)" == "$GITHUB_SHA" ]]
          [[ "$(evidence_value workflow_run)" == "$run_url" ]]
          [[ "$(evidence_value workflow_run_attempt)" == "$run_attempt" ]]
          for result_key in \
            quality_result unit_result race_result sqlc_result \
            delivery_result arm64_runtime_result
          do
            [[ "$(evidence_value "$result_key")" == success ]]
          done

          {
            printf 'ci_run=%s\n' "$run_url"
            printf 'ci_run_attempt=%s\n' "$run_attempt"
            printf 'ci_workflow_ref=%s\n' "$expected_workflow_ref"
            printf 'ci_workflow_sha=%s\n' "$GITHUB_SHA"
            printf 'source_date_epoch=%s\n' "$source_date_epoch"
          } >>"$GITHUB_OUTPUT"

      - name: Register arm64 emulation
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64

      - name: Install checksum-authenticated Buildx and pinned BuildKit
        id: buildx
        run: |
          bash backend/scripts/workflow-setup-buildx.sh \
            "emfont-release-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        id: backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: https://github.com/${{ github.repository }}.git#${{ github.sha }}:backend
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          outputs: type=registry,rewrite-timestamp=true
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.source.outputs.source_date_epoch }}
          tags: |
            ${{ env.BACKEND_REPOSITORY }}:candidate-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          provenance: mode=max,reproducible=true
          sbom: generator=${{ env.SBOM_GENERATOR }}
          cache-from: type=gha,scope=release-backend
          cache-to: type=gha,mode=max,scope=release-backend

      - name: Build and publish PostgreSQL
        id: postgres
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: https://github.com/${{ github.repository }}.git#${{ github.sha }}:backend
          file: docker/postgres/Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          outputs: type=registry,rewrite-timestamp=true
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.source.outputs.source_date_epoch }}
          tags: |
            ${{ env.POSTGRES_REPOSITORY }}:candidate-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=16.14-${{ steps.version.outputs.version }}
          provenance: mode=max,reproducible=true
          sbom: generator=${{ env.SBOM_GENERATOR }}
          cache-from: type=gha,scope=release-postgres
          cache-to: type=gha,mode=max,scope=release-postgres

      - name: Build and publish MinIO server
        id: minio
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: https://github.com/${{ github.repository }}.git#${{ github.sha }}:backend
          file: docker/minio/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          outputs: type=registry,rewrite-timestamp=true
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.source.outputs.source_date_epoch }}
          tags: |
            ${{ env.MINIO_REPOSITORY }}:candidate-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: mode=max,reproducible=true
          sbom: generator=${{ env.SBOM_GENERATOR }}
          cache-from: type=gha,scope=release-minio
          cache-to: type=gha,mode=max,scope=release-minio

      - name: Build and publish MinIO client
        id: minio_mc
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: https://github.com/${{ github.repository }}.git#${{ github.sha }}:backend
          file: docker/minio/Dockerfile.mc
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          outputs: type=registry,rewrite-timestamp=true
          build-args: |
            SOURCE_DATE_EPOCH=${{ steps.source.outputs.source_date_epoch }}
          tags: |
            ${{ env.MINIO_MC_REPOSITORY }}:candidate-sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: mode=max,reproducible=true
          sbom: generator=${{ env.SBOM_GENERATOR }}
          cache-from: type=gha,scope=release-minio-mc
          cache-to: type=gha,mode=max,scope=release-minio-mc

      - name: Publish GitHub build attestations
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ env.BACKEND_REPOSITORY }}
          subject-digest: ${{ steps.backend.outputs.digest }}
          push-to-registry: true

      - name: Attest PostgreSQL image
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ env.POSTGRES_REPOSITORY }}
          subject-digest: ${{ steps.postgres.outputs.digest }}
          push-to-registry: true

      - name: Attest MinIO server image
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ env.MINIO_REPOSITORY }}
          subject-digest: ${{ steps.minio.outputs.digest }}
          push-to-registry: true

      - name: Attest MinIO client image
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ env.MINIO_MC_REPOSITORY }}
          subject-digest: ${{ steps.minio_mc.outputs.digest }}
          push-to-registry: true

      - name: Record exact release references
        id: refs
        env:
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          POSTGRES_DIGEST: ${{ steps.postgres.outputs.digest }}
          MINIO_DIGEST: ${{ steps.minio.outputs.digest }}
          MINIO_MC_DIGEST: ${{ steps.minio_mc.outputs.digest }}
        run: |
          set -euo pipefail
          {
            printf 'backend=%s@%s\n' "$BACKEND_REPOSITORY" "$BACKEND_DIGEST"
            printf 'postgres=%s@%s\n' "$POSTGRES_REPOSITORY" "$POSTGRES_DIGEST"
            printf 'minio=%s@%s\n' "$MINIO_REPOSITORY" "$MINIO_DIGEST"
            printf 'minio_mc=%s@%s\n' "$MINIO_MC_REPOSITORY" "$MINIO_MC_DIGEST"
          } >>"$GITHUB_OUTPUT"

  verify-published:
    name: Verify published exact digests
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    outputs:
      buildkit-sbom-verified: ${{ steps.attestations.outputs.sbom_verified }}
      buildkit-provenance-verified: ${{ steps.attestations.outputs.provenance_verified }}
      github-provenance-verified: ${{ steps.attestations.outputs.github_verified }}
      reproducibility-verified: ${{ steps.reproducibility.outputs.verified }}
      gate-approved: ${{ steps.gate.outputs.approved }}
      trivy-scan-identity-sha256: ${{ steps.trivy.outputs.identity_sha256 }}
      trivy-scan-evidence-sha256: ${{ steps.trivy.outputs.evidence_sha256 }}
      trivy-scan-finished-epoch: ${{ steps.trivy.outputs.scan_finished_epoch }}
    permissions:
      contents: read
      packages: read
      attestations: read
    env:
      BACKEND_REF: ${{ needs.publish.outputs.backend-ref }}
      POSTGRES_REF: ${{ needs.publish.outputs.postgres-ref }}
      MINIO_REF: ${{ needs.publish.outputs.minio-ref }}
      MINIO_MC_REF: ${{ needs.publish.outputs.minio-mc-ref }}
      VERSION: ${{ needs.publish.outputs.version }}
      SOURCE_DATE_EPOCH: ${{ needs.publish.outputs.source-date-epoch }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Register arm64 emulation for clean rebuilds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64

      - name: Install checksum-authenticated Buildx and pinned BuildKit
        id: buildx
        run: |
          bash backend/scripts/workflow-setup-buildx.sh \
            "emfont-release-verify-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Match independent rebuild tooling to publisher
        env:
          PUBLISH_BUILDX_VERSION: ${{ needs.publish.outputs.buildx-version }}
          PUBLISH_BUILDX_BINARY_SHA256: ${{ needs.publish.outputs.buildx-binary-sha256 }}
          PUBLISH_BUILDX_HOST_PLATFORM: ${{ needs.publish.outputs.buildx-host-platform }}
          PUBLISH_BUILDKIT_IMAGE: ${{ needs.publish.outputs.buildkit-image }}
          VERIFY_BUILDX_VERSION: ${{ steps.buildx.outputs.version }}
          VERIFY_BUILDX_BINARY_SHA256: ${{ steps.buildx.outputs.binary_sha256 }}
          VERIFY_BUILDX_HOST_PLATFORM: ${{ steps.buildx.outputs.architecture }}
          VERIFY_BUILDKIT_IMAGE: ${{ steps.buildx.outputs.buildkit_image }}
        run: |
          set -euo pipefail
          test "$VERIFY_BUILDX_VERSION" = "$PUBLISH_BUILDX_VERSION"
          test "$VERIFY_BUILDX_BINARY_SHA256" = \
            "$PUBLISH_BUILDX_BINARY_SHA256"
          test "$VERIFY_BUILDX_HOST_PLATFORM" = "$PUBLISH_BUILDX_HOST_PLATFORM"
          test "$VERIFY_BUILDKIT_IMAGE" = "$PUBLISH_BUILDKIT_IMAGE"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify platform manifests and build attestations
        id: attestations
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          readonly statement_type='https://in-toto.io/Statement/v1'
          readonly sbom_type='https://spdx.dev/Document'
          readonly provenance_type='https://slsa.dev/provenance/v1'
          readonly buildkit_build_type='https://github.com/moby/buildkit/blob/master/docs/attestations/slsa-definitions.md'
          readonly manifest_accept='application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json'
          auth_file="$RUNNER_TEMP/ghcr-auth.netrc"
          registry_config="$RUNNER_TEMP/ghcr-bearer.conf"
          cleanup_registry_auth() {
            rm --force "$auth_file" "$registry_config"
          }
          trap cleanup_registry_auth EXIT
          umask 077
          install -m 0600 /dev/null "$auth_file"
          printf 'machine ghcr.io login %s password %s\n' \
            "$GITHUB_ACTOR" "$GHCR_TOKEN" >"$auth_file"

          configure_registry_auth() {
            local repository_path="$1"
            local registry_token
            registry_token="$(
              curl --fail-with-body --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --netrc-file "$auth_file" \
                --get \
                --data-urlencode 'service=ghcr.io' \
                --data-urlencode "scope=repository:${repository_path}:pull" \
                https://ghcr.io/token | \
                jq --exit-status --raw-output '.token // .access_token'
            )"
            [[ "$registry_token" =~ ^[A-Za-z0-9._~+/=-]+$ ]]
            install -m 0600 /dev/null "$registry_config"
            printf 'header = "Authorization: Bearer %s"\n' \
              "$registry_token" >"$registry_config"
            unset registry_token
          }

          registry_get() {
            local repository_path="$1"
            local object_path="$2"
            local output="$3"
            local accept="$4"
            local max_size="${5:-}"
            local -a size_args=()
            if [[ -n "$max_size" ]]; then
              size_args+=(--max-filesize "$max_size")
            fi
            curl --fail-with-body --silent --show-error --location \
              --proto '=https' \
              --proto-redir '=https' \
              --tlsv1.2 \
              --config "$registry_config" \
              --header "Accept: $accept" \
              "${size_args[@]}" \
              --output "$output" \
              "https://ghcr.io/v2/${repository_path}/${object_path}"
          }

          verify_digest() {
            local file="$1"
            local expected_digest="$2"
            local actual_digest
            [[ "$expected_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || return 1
            actual_digest="sha256:$(sha256sum "$file" | awk '{print $1}')"
            [[ "$actual_digest" == "$expected_digest" ]]
          }

          verify_descriptor() {
            local file="$1"
            local expected_digest="$2"
            local expected_size="$3"
            [[ "$expected_size" =~ ^[1-9][0-9]*$ ]] || return 1
            [[ "$(stat --format '%s' "$file")" == "$expected_size" ]] || return 1
            verify_digest "$file" "$expected_digest"
          }

          validate_index() {
            local index="$1"
            jq --exit-status '
              def image_manifest:
                .mediaType == "application/vnd.oci.image.manifest.v1+json" or
                .mediaType == "application/vnd.docker.distribution.manifest.v2+json";
              def valid_descriptor:
                image_manifest and
                (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                (.size | type == "number" and . > 0 and floor == .) and
                (.platform | type == "object");
              def attestation_manifest:
                .mediaType == "application/vnd.oci.image.manifest.v1+json" and
                .platform.os == "unknown" and
                .platform.architecture == "unknown" and
                .annotations["vnd.docker.reference.type"] == "attestation-manifest" and
                (.annotations["vnd.docker.reference.digest"] |
                  type == "string" and test("^sha256:[0-9a-f]{64}$"));
              def runnable_manifest:
                image_manifest and
                (.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest";

              .schemaVersion == 2 and
              .mediaType == "application/vnd.oci.image.index.v1+json" and
              (.manifests | type == "array" and length == 4) and
              (.manifests | all(valid_descriptor)) and
              (.manifests | all(runnable_manifest or attestation_manifest)) and
              ([.manifests[] | select(runnable_manifest)] as $runnable |
                (([$runnable[] | [.platform.os, .platform.architecture]] | sort) ==
                  [["linux", "amd64"], ["linux", "arm64"]]) and
                ([.manifests[] | select(attestation_manifest)] as $attestations |
                  ($attestations | length == 2) and
                  ([$attestations[].annotations["vnd.docker.reference.digest"]] | sort) ==
                    ([$runnable[].digest] | sort)))
            ' "$index" >/dev/null
          }

          validate_statement_subject() {
            local statement="$1"
            local predicate_type="$2"
            local subject_digest="$3"
            local expected_subject="$4"
            jq --exit-status \
              --arg statement_type "$statement_type" \
              --arg predicate_type "$predicate_type" \
              --arg subject_sha256 "${subject_digest#sha256:}" \
              --arg expected_subject "$expected_subject" '
                ._type == $statement_type and
                .predicateType == $predicate_type and
                (.subject | type == "array" and length == 1) and
                .subject[0].name == $expected_subject and
                (.subject[0].digest | type == "object" and keys == ["sha256"]) and
                .subject[0].digest.sha256 == $subject_sha256 and
                (.predicate | type == "object")
              ' "$statement" >/dev/null
          }

          validate_spdx() {
            local statement="$1"
            local subject_digest="$2"
            local expected_subject="$3"
            validate_statement_subject \
              "$statement" "$sbom_type" "$subject_digest" \
              "$expected_subject" || return 1
            jq --exit-status '
              .predicate.spdxVersion == "SPDX-2.3" and
              .predicate.SPDXID == "SPDXRef-DOCUMENT" and
              .predicate.dataLicense == "CC0-1.0" and
              (.predicate.name | type == "string" and length > 0) and
              (.predicate.documentNamespace | type == "string" and length > 0) and
              (.predicate.creationInfo | type == "object") and
              (.predicate.creationInfo.created |
                type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T.+Z$")) and
              (.predicate.creationInfo.creators |
                type == "array" and length > 0 and
                all(type == "string" and length > 0)) and
              (.predicate.packages | type == "array" and length > 0) and
              (.predicate.packages as $packages |
                ($packages | all(
                  type == "object" and
                  (.SPDXID | type == "string" and startswith("SPDXRef-")) and
                  (.name | type == "string" and length > 0) and
                  (.downloadLocation | type == "string" and length > 0) and
                  (.filesAnalyzed | type == "boolean")
                )) and
                (($packages | map(.SPDXID) | unique | length) == ($packages | length)) and
                ([$packages[] | select(
                  (.name | ascii_downcase |
                    test("^(unknown|placeholder|sbom|none|n/a)$") | not) and
                  (
                    ((.versionInfo? // "") | type == "string" and length > 0) or
                    ([.externalRefs[]? | select(
                      .referenceType == "purl" and
                      (.referenceLocator | type == "string" and startswith("pkg:"))
                    )] | length > 0)
                  )
                )] | length > 0) and
                ([$packages[].externalRefs[]? | select(
                  .referenceType == "purl" and
                  (.referenceLocator | type == "string" and startswith("pkg:"))
                )] | length > 0))
            ' "$statement" >/dev/null
          }

          validate_provenance() {
            local statement="$1"
            local subject_digest="$2"
            local expected_subject="$3"
            local expected_dockerfile="$4"
            local config_source_uri="https://github.com/$GITHUB_REPOSITORY.git#$GITHUB_SHA:backend"
            local source_dependency_uri="https://github.com/$GITHUB_REPOSITORY.git#$GITHUB_SHA"
            local trusted_builder="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT"
            validate_statement_subject \
              "$statement" "$provenance_type" "$subject_digest" \
              "$expected_subject" || return 1
            jq --exit-status \
              --arg build_type "$buildkit_build_type" \
              --arg source_digest "$GITHUB_SHA" \
              --arg config_source_uri "$config_source_uri" \
              --arg source_dependency_uri "$source_dependency_uri" \
              --arg expected_dockerfile "$expected_dockerfile" \
              --arg trusted_builder "$trusted_builder" '
                .predicate.buildDefinition.buildType == $build_type and
                (.predicate.buildDefinition.externalParameters | type == "object") and
                .predicate.buildDefinition.externalParameters.configSource.uri ==
                  $config_source_uri and
                .predicate.buildDefinition.externalParameters.configSource.digest.sha1 ==
                  $source_digest and
                .predicate.buildDefinition.externalParameters.configSource.path ==
                  $expected_dockerfile and
                .predicate.buildDefinition.externalParameters.request.frontend ==
                  "dockerfile.v0" and
                (.predicate.buildDefinition.externalParameters.request.args |
                  type == "object") and
                ((.predicate.buildDefinition.externalParameters.request.locals // []) |
                  type == "array" and length == 0) and
                (.predicate.buildDefinition.internalParameters | type == "object") and
                .predicate.buildDefinition.internalParameters.builderPlatform ==
                  "linux/amd64" and
                (.predicate.buildDefinition.internalParameters.buildConfig |
                  type == "object") and
                (.predicate.buildDefinition.internalParameters.buildConfig.llbDefinition |
                  type == "array" and length > 0 and
                  all(
                    type == "object" and
                    (.id | type == "string" and length > 0)
                  )) and
                (.predicate.buildDefinition.resolvedDependencies |
                  type == "array" and length > 0 and
                  all(
                    type == "object" and
                    (.uri | type == "string" and length > 0) and
                    (.digest |
                      type == "object" and length > 0 and
                      all(
                        to_entries[];
                        (.key | type == "string" and length > 0) and
                        (.value |
                          type == "string" and test("^[0-9a-f]{32,}$"))
                      ))
                  )) and
                (.predicate.buildDefinition.resolvedDependencies | any(
                  .uri == $source_dependency_uri and
                  .digest.sha1 == $source_digest
                )) and
                (.predicate.runDetails | type == "object") and
                (.predicate.runDetails.builder | type == "object") and
                .predicate.runDetails.builder.id == $trusted_builder and
                (.predicate.runDetails.metadata | type == "object") and
                (.predicate.runDetails.metadata.invocationId |
                  type == "string" and length > 0) and
                (.predicate.runDetails.metadata.startedOn |
                  type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T.+Z$")) and
                (.predicate.runDetails.metadata.finishedOn |
                  type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T.+Z$")) and
                (.predicate.runDetails.metadata.buildkit_completeness |
                  type == "object" and
                  .request == true and
                  .resolvedDependencies == true) and
                .predicate.runDetails.metadata.buildkit_reproducible == true and
                (.predicate.runDetails.metadata.buildkit_metadata | type == "object")
              ' "$statement" >/dev/null
          }

          expect_rejected() {
            local fixture_name="$1"
            shift
            if "$@" >/dev/null 2>&1; then
              printf 'attestation negative fixture was accepted: %s\n' \
                "$fixture_name" >&2
              return 1
            fi
          }

          test_attestation_validators() {
            local fixture_dir="$RUNNER_TEMP/attestation-negative-fixtures"
            local fixture_digest=sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
            local fixture_subject="pkg:docker/$BACKEND_REPOSITORY@candidate-sha-$GITHUB_SHA?platform=linux%2Famd64"
            local config_source_uri="https://github.com/$GITHUB_REPOSITORY.git#$GITHUB_SHA:backend"
            local source_dependency_uri="https://github.com/$GITHUB_REPOSITORY.git#$GITHUB_SHA"
            local trusted_builder="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT"
            local good_spdx="$fixture_dir/good-spdx.json"
            local good_provenance="$fixture_dir/good-provenance.json"
            install -d -m 0700 "$fixture_dir"

            jq --null-input \
              --arg statement_type "$statement_type" \
              --arg predicate_type "$sbom_type" \
              --arg subject "$fixture_subject" \
              --arg digest "${fixture_digest#sha256:}" '
                {
                  _type: $statement_type,
                  predicateType: $predicate_type,
                  subject: [{name: $subject, digest: {sha256: $digest}}],
                  predicate: {
                    spdxVersion: "SPDX-2.3",
                    SPDXID: "SPDXRef-DOCUMENT",
                    dataLicense: "CC0-1.0",
                    name: "fixture",
                    documentNamespace: "https://example.invalid/spdx/fixture",
                    creationInfo: {
                      created: "2026-01-01T00:00:00Z",
                      creators: ["Tool: fixture"]
                    },
                    packages: [{
                      SPDXID: "SPDXRef-Package-real",
                      name: "real-package",
                      versionInfo: "1.0.0",
                      downloadLocation: "NOASSERTION",
                      filesAnalyzed: false,
                      externalRefs: [{
                        referenceCategory: "PACKAGE_MANAGER",
                        referenceType: "purl",
                        referenceLocator: "pkg:generic/real-package@1.0.0"
                      }]
                    }]
                  }
                }
              ' >"$good_spdx"
            validate_spdx "$good_spdx" "$fixture_digest" "$fixture_subject"

            jq --null-input \
              --arg statement_type "$statement_type" \
              --arg predicate_type "$provenance_type" \
              --arg build_type "$buildkit_build_type" \
              --arg subject "$fixture_subject" \
              --arg digest "${fixture_digest#sha256:}" \
              --arg config_source_uri "$config_source_uri" \
              --arg source_dependency_uri "$source_dependency_uri" \
              --arg source_digest "$GITHUB_SHA" \
              --arg trusted_builder "$trusted_builder" '
                {
                  _type: $statement_type,
                  predicateType: $predicate_type,
                  subject: [{name: $subject, digest: {sha256: $digest}}],
                  predicate: {
                    buildDefinition: {
                      buildType: $build_type,
                      externalParameters: {
                        configSource: {
                          uri: $config_source_uri,
                          digest: {sha1: $source_digest},
                          path: "Dockerfile"
                        },
                        request: {
                          frontend: "dockerfile.v0",
                          args: {}
                        }
                      },
                      internalParameters: {
                        builderPlatform: "linux/amd64",
                        buildConfig: {llbDefinition: [{id: "step0"}]}
                      },
                      resolvedDependencies: [{
                        uri: $source_dependency_uri,
                        digest: {sha1: $source_digest}
                      }]
                    },
                    runDetails: {
                      builder: {id: $trusted_builder},
                      metadata: {
                        invocationId: "fixture-invocation",
                        startedOn: "2026-01-01T00:00:00Z",
                        finishedOn: "2026-01-01T00:00:01Z",
                        buildkit_completeness: {
                          request: true,
                          resolvedDependencies: true
                        },
                        buildkit_reproducible: true,
                        buildkit_metadata: {}
                      }
                    }
                  }
                }
              ' >"$good_provenance"
            validate_provenance \
              "$good_provenance" "$fixture_digest" "$fixture_subject" Dockerfile

            jq '.subject[0].name = "pkg:docker/ghcr.io/attacker/image@candidate?platform=linux%2Famd64"' \
              "$good_spdx" >"$fixture_dir/wrong-subject.json"
            expect_rejected wrong-subject validate_spdx \
              "$fixture_dir/wrong-subject.json" "$fixture_digest" "$fixture_subject"
            jq '.predicate.packages = [{
              SPDXID: "SPDXRef-Package-placeholder",
              name: "placeholder",
              downloadLocation: "NOASSERTION",
              filesAnalyzed: false
            }]' "$good_spdx" >"$fixture_dir/placeholder-package.json"
            expect_rejected placeholder-package validate_spdx \
              "$fixture_dir/placeholder-package.json" "$fixture_digest" "$fixture_subject"

            jq '.predicate.buildDefinition.externalParameters.configSource.uri =
              "https://github.com/attacker/repository.git#main"' \
              "$good_provenance" >"$fixture_dir/wrong-source.json"
            expect_rejected wrong-source validate_provenance \
              "$fixture_dir/wrong-source.json" "$fixture_digest" "$fixture_subject" Dockerfile
            jq '.predicate.buildDefinition.externalParameters.configSource.path =
              "docker/other/Dockerfile"' \
              "$good_provenance" >"$fixture_dir/wrong-dockerfile.json"
            expect_rejected wrong-dockerfile validate_provenance \
              "$fixture_dir/wrong-dockerfile.json" "$fixture_digest" "$fixture_subject" Dockerfile
            jq '.predicate.runDetails.builder.id = ""' \
              "$good_provenance" >"$fixture_dir/empty-builder.json"
            expect_rejected empty-builder validate_provenance \
              "$fixture_dir/empty-builder.json" "$fixture_digest" "$fixture_subject" Dockerfile
            jq '.predicate.runDetails.metadata.buildkit_completeness.resolvedDependencies = false' \
              "$good_provenance" >"$fixture_dir/incomplete-dependencies.json"
            expect_rejected incomplete-dependencies validate_provenance \
              "$fixture_dir/incomplete-dependencies.json" "$fixture_digest" "$fixture_subject" Dockerfile
          }

          validate_attestation_manifest() {
            local attestation="$1"
            jq --exit-status \
              --arg sbom_type "$sbom_type" \
              --arg provenance_type "$provenance_type" '
                .schemaVersion == 2 and
                .mediaType == "application/vnd.oci.image.manifest.v1+json" and
                (.config | type == "object") and
                .config.mediaType == "application/vnd.oci.image.config.v1+json" and
                (.config.digest |
                  type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                (.config.size |
                  type == "number" and . > 0 and . <= 1048576 and floor == .) and
                (.layers | type == "array" and length == 2) and
                ([.layers[] | select(
                  .mediaType == "application/vnd.in-toto+json" and
                  .annotations["in-toto.io/predicate-type"] == $sbom_type and
                  (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                  (.size | type == "number" and . > 0 and . <= 536870912 and floor == .)
                )] | length == 1) and
                ([.layers[] | select(
                  .mediaType == "application/vnd.in-toto+json" and
                  .annotations["in-toto.io/predicate-type"] == $provenance_type and
                  (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                  (.size | type == "number" and . > 0 and . <= 536870912 and floor == .)
                )] | length == 1)
              ' "$attestation" >/dev/null
          }

          test_attestation_validators

          for image_spec in \
            "$BACKEND_REF|backend" \
            "$POSTGRES_REF|postgres" \
            "$MINIO_REF|minio-server" \
            "$MINIO_MC_REF|minio-mc"
          do
            IFS='|' read -r reference slug <<<"$image_spec"
            [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
            repository_path="${reference#ghcr.io/}"
            repository_path="${repository_path%@*}"
            repository="${reference%@*}"
            root_digest="${reference##*@}"
            case "$slug" in
              backend) dockerfile=Dockerfile ;;
              postgres) dockerfile=docker/postgres/Dockerfile ;;
              minio-server) dockerfile=docker/minio/Dockerfile.server ;;
              minio-mc) dockerfile=docker/minio/Dockerfile.mc ;;
              *) exit 2 ;;
            esac
            configure_registry_auth "$repository_path"
            index="$RUNNER_TEMP/${slug}-index.json"
            registry_get \
              "$repository_path" "manifests/$root_digest" "$index" \
              "$manifest_accept" 16777216
            verify_digest "$index" "$root_digest"
            validate_index "$index"

            for architecture in amd64 arm64; do
              expected_subject="pkg:docker/${repository}@candidate-sha-${GITHUB_SHA}?platform=linux%2F${architecture}"
              subject_digest="$(
                jq --exit-status --raw-output \
                  --arg architecture "$architecture" '
                    [
                      .manifests[]
                      | select(
                          .annotations["vnd.docker.reference.type"] != "attestation-manifest" and
                          .platform.os == "linux" and
                          .platform.architecture == $architecture
                        )
                    ]
                    | if length == 1 and
                         (.[0].digest | test("^sha256:[0-9a-f]{64}$"))
                      then .[0].digest
                      else error("missing unique linux/" + $architecture + " manifest")
                      end
                  ' "$index"
              )"
              attestation_digest="$(
                jq --exit-status --raw-output \
                  --arg subject_digest "$subject_digest" '
                    [
                      .manifests[]
                      | select(
                          .mediaType == "application/vnd.oci.image.manifest.v1+json" and
                          .platform.os == "unknown" and
                          .platform.architecture == "unknown" and
                          .annotations["vnd.docker.reference.type"] == "attestation-manifest" and
                          .annotations["vnd.docker.reference.digest"] == $subject_digest
                        )
                    ]
                    | if length == 1 and
                         (.[0].digest | test("^sha256:[0-9a-f]{64}$"))
                      then .[0].digest
                      else error("missing unique attestation manifest for " + $subject_digest)
                      end
                  ' "$index"
              )"
              attestation_size="$(
                jq --exit-status --raw-output \
                  --arg attestation_digest "$attestation_digest" '
                    .manifests[]
                    | select(.digest == $attestation_digest)
                    | .size
                  ' "$index"
              )"
              attestation="$RUNNER_TEMP/${slug}-${architecture}-attestation.json"
              registry_get \
                "$repository_path" "manifests/$attestation_digest" "$attestation" \
                'application/vnd.oci.image.manifest.v1+json' 16777216
              verify_descriptor \
                "$attestation" "$attestation_digest" "$attestation_size"
              validate_attestation_manifest "$attestation"

              read -r config_digest config_size < <(
                jq --exit-status --raw-output '
                  [.config.digest, (.config.size | tostring)] | @tsv
                ' "$attestation"
              )
              config="$RUNNER_TEMP/${slug}-${architecture}-attestation-config.json"
              registry_get \
                "$repository_path" "blobs/$config_digest" "$config" \
                'application/vnd.oci.image.config.v1+json' "$config_size"
              verify_descriptor "$config" "$config_digest" "$config_size"

              for predicate_spec in \
                "$sbom_type|sbom" \
                "$provenance_type|provenance"
              do
                IFS='|' read -r predicate_type predicate_slug <<<"$predicate_spec"
                read -r layer_digest layer_size < <(
                  jq --exit-status --raw-output \
                    --arg predicate_type "$predicate_type" '
                      .layers[]
                      | select(
                          .mediaType == "application/vnd.in-toto+json" and
                          .annotations["in-toto.io/predicate-type"] == $predicate_type
                        )
                      | [.digest, (.size | tostring)]
                      | @tsv
                    ' "$attestation"
                )
                statement="$RUNNER_TEMP/${slug}-${architecture}-${predicate_slug}.json"
                registry_get \
                  "$repository_path" "blobs/$layer_digest" "$statement" \
                  'application/vnd.in-toto+json' "$layer_size"
                verify_descriptor "$statement" "$layer_digest" "$layer_size"
                case "$predicate_slug" in
                  sbom)
                    validate_spdx \
                      "$statement" "$subject_digest" "$expected_subject"
                    ;;
                  provenance)
                    validate_provenance \
                      "$statement" "$subject_digest" \
                      "$expected_subject" "$dockerfile"
                    ;;
                  *)
                    exit 2
                    ;;
                esac
              done
            done
            gh attestation verify "oci://$reference" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/backend-release.yml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --predicate-type "$provenance_type" \
              --deny-self-hosted-runners \
              >/dev/null
          done
          {
            printf 'sbom_verified=true\n'
            printf 'provenance_verified=true\n'
            printf 'github_verified=true\n'
          } >>"$GITHUB_OUTPUT"

      - name: Rebuild clean and compare every runnable platform artifact
        id: reproducibility
        run: |
          set -euo pipefail
          readonly buildkit_image='moby/buildkit:v0.31.0@sha256:a095b3d11ce1a9a05b6064ef515dfca0291ec5bcf2ea8178da8f6461924294e1'
          work_dir="$RUNNER_TEMP/reproducibility"
          clean_builder="emfont-release-repro-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          install -d -m 0700 "$work_dir"

          cleanup_reproducibility() {
            docker buildx rm --force "$clean_builder" >/dev/null 2>&1 || true
          }
          trap cleanup_reproducibility EXIT
          docker buildx create \
            --name "$clean_builder" \
            --driver docker-container \
            --driver-opt "image=$buildkit_image" >/dev/null
          docker buildx inspect --builder "$clean_builder" --bootstrap >/dev/null

          verify_blob() {
            local file="$1"
            local digest="$2"
            local size="$3"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$size" =~ ^[1-9][0-9]*$ ]]
            [[ "$(stat --format '%s' "$file")" == "$size" ]]
            [[ "sha256:$(sha256sum "$file" | awk '{print $1}')" == "$digest" ]]
          }

          layout_blob() {
            local layout="$1"
            local digest="$2"
            printf '%s/blobs/sha256/%s\n' "$layout" "${digest#sha256:}"
          }

          find_platform_index() {
            local layout="$1"
            local current="$layout/index.json"
            local descriptor digest size next
            local depth
            for ((depth = 0; depth < 3; depth++)); do
              if jq --exit-status '
                [.manifests[] | select(
                  .platform.os == "linux" and
                  (.platform.architecture == "amd64" or
                   .platform.architecture == "arm64")
                )] | length == 2
              ' "$current" >/dev/null; then
                printf '%s\n' "$current"
                return 0
              fi
              descriptor="$(jq --exit-status --compact-output '
                if (.manifests | length) == 1 and
                   .manifests[0].mediaType == "application/vnd.oci.image.index.v1+json"
                then .manifests[0]
                else error("layout does not contain a unique nested OCI index")
                end
              ' "$current")"
              digest="$(jq --exit-status --raw-output '.digest' <<<"$descriptor")"
              size="$(jq --exit-status --raw-output '.size' <<<"$descriptor")"
              next="$(layout_blob "$layout" "$digest")"
              verify_blob "$next" "$digest" "$size"
              current="$next"
            done
            printf 'could not resolve runnable platform index in %s\n' "$layout" >&2
            return 1
          }

          platform_descriptor() {
            local index="$1"
            local architecture="$2"
            jq --exit-status --compact-output \
              --arg architecture "$architecture" '
                [.manifests[] | select(
                  .platform.os == "linux" and
                  .platform.architecture == $architecture and
                  ((.platform.variant // "") == "")
                )]
                | if length == 1 then .[0]
                  else error("missing unique linux/" + $architecture + " descriptor")
                  end
              ' "$index"
          }

          compare_platform() {
            local reference="$1"
            local slug="$2"
            local architecture="$3"
            local published_index="$4"
            local local_index="$5"
            local layout="$6"
            local published_descriptor local_descriptor
            local published_digest published_size local_digest local_size
            local published_manifest local_manifest

            published_descriptor="$(platform_descriptor \
              "$published_index" "$architecture")"
            local_descriptor="$(platform_descriptor "$local_index" "$architecture")"
            published_digest="$(jq --exit-status --raw-output \
              '.digest' <<<"$published_descriptor")"
            published_size="$(jq --exit-status --raw-output \
              '.size' <<<"$published_descriptor")"
            local_digest="$(jq --exit-status --raw-output \
              '.digest' <<<"$local_descriptor")"
            local_size="$(jq --exit-status --raw-output \
              '.size' <<<"$local_descriptor")"
            [[ "$local_digest" == "$published_digest" ]]
            [[ "$local_size" == "$published_size" ]]
            [[ "$(jq -r '.mediaType' <<<"$local_descriptor")" == \
              "$(jq -r '.mediaType' <<<"$published_descriptor")" ]]

            local_manifest="$(layout_blob "$layout" "$local_digest")"
            verify_blob "$local_manifest" "$local_digest" "$local_size"
            published_manifest="$work_dir/${slug}-${architecture}-published-manifest.json"
            docker buildx imagetools inspect --raw \
              "${reference%@*}@$published_digest" >"$published_manifest"
            verify_blob "$published_manifest" "$published_digest" "$published_size"
            cmp --silent "$local_manifest" "$published_manifest"

            diff --unified \
              <(jq --sort-keys '.config' "$published_manifest") \
              <(jq --sort-keys '.config' "$local_manifest")
            diff --unified \
              <(jq --compact-output '.layers' "$published_manifest") \
              <(jq --compact-output '.layers' "$local_manifest")

            read -r config_digest config_size < <(
              jq --exit-status --raw-output '
                [.config.digest, (.config.size | tostring)] | @tsv
              ' "$local_manifest"
            )
            verify_blob \
              "$(layout_blob "$layout" "$config_digest")" \
              "$config_digest" "$config_size"
            while IFS=$'\t' read -r layer_digest layer_size; do
              verify_blob \
                "$(layout_blob "$layout" "$layer_digest")" \
                "$layer_digest" "$layer_size"
            done < <(jq --exit-status --raw-output '
              .layers[] | [.digest, (.size | tostring)] | @tsv
            ' "$local_manifest")
          }

          for image_spec in \
            "$BACKEND_REF|backend|Dockerfile|$VERSION" \
            "$POSTGRES_REF|postgres|docker/postgres/Dockerfile|16.14-$VERSION" \
            "$MINIO_REF|minio-server|docker/minio/Dockerfile.server|" \
            "$MINIO_MC_REF|minio-mc|docker/minio/Dockerfile.mc|"
          do
            IFS='|' read -r reference slug dockerfile image_version <<<"$image_spec"
            archive="$work_dir/$slug.oci.tar"
            layout="$work_dir/$slug-layout"
            published_index="$work_dir/$slug-published-index.json"
            build_args=(
              --builder "$clean_builder"
              --no-cache
              --pull
              --platform "linux/amd64,linux/arm64"
              --build-arg "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
              --file "$dockerfile"
              --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY"
              --label "org.opencontainers.image.revision=$GITHUB_SHA"
              --provenance=false
              --sbom=false
              --output "type=oci,dest=$archive,rewrite-timestamp=true"
            )
            if [[ -n "$image_version" ]]; then
              build_args+=(--label "org.opencontainers.image.version=$image_version")
            fi
            docker buildx build "${build_args[@]}" \
              "https://github.com/$GITHUB_REPOSITORY.git#$GITHUB_SHA:backend"

            install -d -m 0700 "$layout"
            tar --extract --file "$archive" --directory "$layout" \
              --no-same-owner --no-same-permissions
            root_digest="${reference##*@}"
            docker buildx imagetools inspect --raw "$reference" \
              >"$published_index"
            [[ "sha256:$(sha256sum "$published_index" | awk '{print $1}')" == \
              "$root_digest" ]]
            local_index="$(find_platform_index "$layout")"
            compare_platform "$reference" "$slug" amd64 \
              "$published_index" "$local_index" "$layout"
            compare_platform "$reference" "$slug" arm64 \
              "$published_index" "$local_index" "$layout"
            rm --recursive --force \
              "$layout" \
              "$archive" \
              "$published_index" \
              "$work_dir/${slug}-amd64-published-manifest.json" \
              "$work_dir/${slug}-arm64-published-manifest.json"
            docker buildx prune \
              --builder "$clean_builder" --all --force >/dev/null
          done
          printf 'verified=true\n' >>"$GITHUB_OUTPUT"

      - name: Pull exact amd64 release images
        run: |
          set -euo pipefail
          for reference in "$BACKEND_REF" "$POSTGRES_REF" "$MINIO_REF" "$MINIO_MC_REF"; do
            docker pull --platform linux/amd64 "$reference"
            test "$(docker image inspect --format '{{.Architecture}}' "$reference")" = amd64
          done
          test "$(docker image inspect --format \
            '{{index .Config.Labels "io.emfont.security-patches"}}' \
            "$MINIO_REF")" = \
            'CVE-2026-40344,CVE-2026-41145'
          test "$(docker image inspect --format \
            '{{index .Config.Labels "io.emfont.security-topology-controls"}}' \
            "$MINIO_REF")" = \
            'CVE-2026-33322,CVE-2026-33419,CVE-2026-34204,CVE-2026-39414'

      - name: Install font reference tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libharfbuzz-bin \
            woff2

      - name: Smoke exact PostgreSQL and MinIO digests
        run: |
          set -euo pipefail
          EMFONT_VERIFY_SKIP_BUILD=true TRIVY_IMAGE="$TRIVY_IMAGE" \
            backend/docker/postgres/verify.sh "$POSTGRES_REF" linux/amd64
          SERVER_IMAGE="$MINIO_REF" MC_IMAGE="$MINIO_MC_REF" PLATFORM=linux/amd64 \
            backend/docker/minio/smoke.sh

      - name: Verify official font hash from exact backend digest
        run: |
          set -euo pipefail
          backend/scripts/verify-fontworker-image.sh "$BACKEND_REF" linux/amd64

      - name: Scan every exact release digest
        id: trivy
        run: |
          set -euo pipefail
          readonly db_max_age_seconds=86400
          report_dir="$GITHUB_WORKSPACE/trivy-release-reports"
          cache_dir="$RUNNER_TEMP/trivy-cache-amd64"
          pull_auth_file="$RUNNER_TEMP/trivy-amd64-pull-source.netrc"
          pull_config_dir="$RUNNER_TEMP/trivy-amd64-pull-config"
          pull_config_file="$pull_config_dir/config.json"
          [[ ! -e "$report_dir" ]]
          [[ ! -e "$cache_dir" ]]
          [[ ! -e "$pull_config_dir" ]]
          install -d -m 0700 "$report_dir" "$cache_dir" "$pull_config_dir"
          umask 077
          install -m 0600 /dev/null "$pull_auth_file"
          printf 'machine ghcr.io login %s password %s\n' \
            "$GITHUB_ACTOR" "$GH_TOKEN" >"$pull_auth_file"
          printf '{"auths":{}}\n' >"$pull_config_file"

          # Invoked by the EXIT trap.
          # shellcheck disable=SC2317
          cleanup_trivy_pull_auth() {
            rm --force "$pull_auth_file"
            rm --recursive --force "$pull_config_dir"
          }
          trap cleanup_trivy_pull_auth EXIT

          configure_trivy_pull_auth() {
            local reference="$1"
            local repository_path registry_token
            [[ "$reference" =~ ^ghcr\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]
            repository_path="${reference#ghcr.io/}"
            repository_path="${repository_path%@*}"
            registry_token="$(
              curl --fail-with-body --silent --show-error \
                --proto '=https' \
                --tlsv1.2 \
                --netrc-file "$pull_auth_file" \
                --get \
                --data-urlencode 'service=ghcr.io' \
                --data-urlencode "scope=repository:${repository_path}:pull" \
                https://ghcr.io/token | \
              jq --exit-status --raw-output '
                (.token // .access_token) as $token |
                if ($token | type == "string" and
                    length > 0 and length <= 16384)
                then $token
                else error("invalid GHCR pull token")
                end
              '
            )"
            [[ "$registry_token" =~ ^[A-Za-z0-9._~+/=-]+$ ]]
            printf '{"auths":{"ghcr.io":{"identitytoken":"%s"}}}\n' \
              "$registry_token" >"$pull_config_file.tmp"
            mv --force "$pull_config_file.tmp" "$pull_config_file"
            unset registry_token
          }

          trivy=(
            docker run --rm
            --volume "$pull_config_dir:/root/.docker:ro"
            --volume "$cache_dir:/root/.cache/trivy"
            --volume "$report_dir:/reports"
            "$TRIVY_IMAGE"
          )

          scan_started_epoch="$(date --utc +%s)"
          scan_started_at="$(date --utc --date="@$scan_started_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          "${trivy[@]}" image --download-db-only
          "${trivy[@]}" version --format json >"$report_dir/trivy-version.json"
          jq --exit-status --arg version "$TRIVY_VERSION" '
            .Version == $version and
            .VulnerabilityDB.Version == 2 and
            (.VulnerabilityDB.UpdatedAt | type == "string" and length > 0) and
            (.VulnerabilityDB.NextUpdate | type == "string" and length > 0) and
            (.VulnerabilityDB.DownloadedAt | type == "string" and length > 0)
          ' "$report_dir/trivy-version.json" >/dev/null
          now_epoch="$(date --utc +%s)"
          updated_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.UpdatedAt' "$report_dir/trivy-version.json")" +%s)"
          next_update_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.NextUpdate' "$report_dir/trivy-version.json")" +%s)"
          downloaded_epoch="$(date --utc --date="$(jq --raw-output \
            '.VulnerabilityDB.DownloadedAt' "$report_dir/trivy-version.json")" +%s)"
          ((updated_epoch <= now_epoch + 300))
          ((now_epoch - updated_epoch <= db_max_age_seconds))
          ((downloaded_epoch >= scan_started_epoch - 300))
          ((downloaded_epoch <= now_epoch + 300))
          ((next_update_epoch > updated_epoch))
          ((next_update_epoch >= now_epoch - 300))
          db_file="$cache_dir/db/trivy.db"
          [[ -s "$db_file" ]]
          db_sha256="sha256:$(sha256sum "$db_file" | awk '{print $1}')"

          validate_scan_report() {
            local report="$1"
            local reference="$2"
            jq --exit-status \
              --arg reference "$reference" \
              --arg architecture amd64 '
                .SchemaVersion == 2 and
                .ArtifactName == $reference and
                .ArtifactType == "container_image" and
                .Metadata.ImageConfig.os == "linux" and
                .Metadata.ImageConfig.architecture == $architecture and
                (.Metadata.Layers | type == "array" and length > 0)
              ' "$report" >/dev/null
          }

          normalize_high_critical_report() {
            local report="$1"
            local reference="$2"
            local component="$3"
            local platform="$4"
            local output="$5"
            jq --sort-keys \
              --arg schema 'emfont.trivy-high-critical/v1' \
              --arg reference "$reference" \
              --arg component "$component" \
              --arg platform "$platform" '
                {
                  schema: $schema,
                  component: $component,
                  platform: $platform,
                  image: $reference,
                  findings: ([
                    .Results[]? as $result
                    | ($result.Vulnerabilities // [])[]
                    | select(.Severity == "HIGH" or .Severity == "CRITICAL")
                    | {
                        vulnerability_id: .VulnerabilityID,
                        target: $result.Target,
                        class: ($result.Class // ""),
                        type: ($result.Type // ""),
                        package: .PkgName,
                        installed_version: .InstalledVersion,
                        fixed_version: (.FixedVersion // ""),
                        status: (.Status // ""),
                        severity: .Severity
                      }
                  ] | unique_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]) | sort_by([
                    .vulnerability_id,
                    .target,
                    .class,
                    .type,
                    .package,
                    .installed_version,
                    .fixed_version,
                    .status,
                    .severity
                  ]))
                }
              ' "$report" >"$output"
            jq --exit-status '
              .schema == "emfont.trivy-high-critical/v1" and
              (.component | type == "string" and length > 0) and
              (.platform == "linux/amd64" or .platform == "linux/arm64") and
              (.image | type == "string" and
                test("^ghcr\\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$")) and
              (.findings | type == "array" and all(
                (.vulnerability_id | type == "string" and length > 0) and
                (.target | type == "string" and length > 0) and
                (.class | type == "string") and
                (.type | type == "string") and
                (.package | type == "string" and length > 0) and
                (.installed_version | type == "string" and length > 0) and
                (.fixed_version | type == "string") and
                (.status | type == "string") and
                (.severity == "HIGH" or .severity == "CRITICAL")
              ))
            ' "$output" >/dev/null
          }

          gate=0
          identity_rows="$RUNNER_TEMP/trivy-amd64-identity.tsv"
          install -m 0600 /dev/null "$identity_rows"
          for image_spec in \
            "$BACKEND_REF|backend" \
            "$POSTGRES_REF|postgres" \
            "$MINIO_REF|minio-server" \
            "$MINIO_MC_REF|minio-mc"
          do
            IFS='|' read -r reference slug <<<"$image_spec"
            configure_trivy_pull_auth "$reference"
            "${trivy[@]}" image \
              --image-src remote \
              --platform linux/amd64 \
              --skip-db-update \
              --exit-code 0 --scanners vuln \
              --format json --output "/reports/${slug}-full.json" "$reference"
            rm --force "$pull_config_file"
            validate_scan_report "$report_dir/${slug}-full.json" "$reference"
            normalized="$report_dir/${slug}-high-critical.normalized.json"
            normalize_high_critical_report \
              "$report_dir/${slug}-full.json" "$reference" "$slug" \
              linux/amd64 "$normalized"
            jq --sort-keys '
              .findings = [.findings[] | select(.fixed_version != "")]
            ' "$normalized" >"$report_dir/${slug}-fixable-high-critical.json"
            if jq --exit-status '.findings | length > 0' \
              "$report_dir/${slug}-fixable-high-critical.json" >/dev/null; then
              gate=1
            fi
            normalized_sha256="sha256:$(sha256sum "$normalized" | awk '{print $1}')"
            printf '%s\t%s\t%s\n' \
              "$slug" "$reference" "$normalized_sha256" >>"$identity_rows"
          done

          identity_file="$report_dir/scan-identity.json"
          jq --raw-input --slurp --sort-keys \
            --arg schema 'emfont.trivy-scan-identity/v1' \
            --arg platform linux/amd64 '
              {
                schema: $schema,
                platform: $platform,
                images: ([
                  split("\n")[]
                  | select(length > 0)
                  | split("\t")
                  | {
                      component: .[0],
                      image: .[1],
                      report_sha256: .[2]
                    }
                ] | sort_by(.component))
              }
            ' "$identity_rows" >"$identity_file"
          jq --exit-status '
            .schema == "emfont.trivy-scan-identity/v1" and
            .platform == "linux/amd64" and
            ([.images[].component] ==
              ["backend", "minio-mc", "minio-server", "postgres"]) and
            (.images | all(
              (.image | test("^ghcr\\.io/yorukot/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$")) and
              (.report_sha256 | test("^sha256:[0-9a-f]{64}$"))
            ))
          ' "$identity_file" >/dev/null
          identity_sha256="sha256:$(sha256sum "$identity_file" | awk '{print $1}')"

          scan_finished_epoch="$(date --utc +%s)"
          scan_finished_at="$(date --utc --date="@$scan_finished_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          ((scan_finished_epoch >= scan_started_epoch))
          ((scan_finished_epoch - scan_started_epoch <= 3600))
          evidence_file="$report_dir/scan-evidence.json"
          jq --null-input --sort-keys \
            --arg schema 'emfont.trivy-scan-evidence/v1' \
            --arg platform linux/amd64 \
            --arg scanner_image "$TRIVY_IMAGE" \
            --arg scanner_version "$TRIVY_VERSION" \
            --arg db_sha256 "$db_sha256" \
            --arg db_updated_at "$(jq --raw-output \
              '.VulnerabilityDB.UpdatedAt' "$report_dir/trivy-version.json")" \
            --arg db_downloaded_at "$(jq --raw-output \
              '.VulnerabilityDB.DownloadedAt' "$report_dir/trivy-version.json")" \
            --arg scan_started_at "$scan_started_at" \
            --arg scan_finished_at "$scan_finished_at" \
            --arg identity_sha256 "$identity_sha256" \
            --slurpfile identity "$identity_file" '
              {
                schema: $schema,
                platform: $platform,
                scanner_image: $scanner_image,
                scanner_version: $scanner_version,
                database_sha256: $db_sha256,
                database_updated_at: $db_updated_at,
                database_downloaded_at: $db_downloaded_at,
                scan_started_at: $scan_started_at,
                scan_finished_at: $scan_finished_at,
                identity_sha256: $identity_sha256,
                identity: $identity[0]
              }
            ' >"$evidence_file"
          evidence_sha256="sha256:$(sha256sum "$evidence_file" | awk '{print $1}')"
          {
            printf 'scanner_image=%s\n' "$TRIVY_IMAGE"
            printf 'scanner_version=%s\n' "$TRIVY_VERSION"
            printf 'image_source=remote\n'
            printf 'platform=linux/amd64\n'
            printf 'database_sha256=%s\n' "$db_sha256"
            printf 'database_updated_at=%s\n' \
              "$(jq --raw-output '.VulnerabilityDB.UpdatedAt' \
                "$report_dir/trivy-version.json")"
            printf 'scan_started_at=%s\n' "$scan_started_at"
            printf 'scan_finished_at=%s\n' "$scan_finished_at"
            printf 'identity_sha256=%s\n' "$identity_sha256"
            printf 'evidence_sha256=%s\n' "$evidence_sha256"
          } >"$report_dir/scan-metadata.env"
          {
            printf 'identity_sha256=%s\n' "$identity_sha256"
            printf 'evidence_sha256=%s\n' "$evidence_sha256"
            printf 'scan_finished_epoch=%s\n' "$scan_finished_epoch"
          } >>"$GITHUB_OUTPUT"
          exit "$gate"

      - name: Record amd64 gate approval
        id: gate
        run: printf 'approved=true\n' >>"$GITHUB_OUTPUT"

      - name: Upload exact-release security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-release-security-${{ needs.publish.outputs.version }}-${{ github.run_attempt }}
          path: trivy-release-reports/
          if-no-files-found: warn
          retention-days: 90

  verify-published-arm64:
    name: Verify published exact digests on arm64
    needs: publish
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    outputs:
      gate-approved: ${{ steps.gate.outputs.approved }}
      trivy-scan-identity-sha256: ${{ steps.trivy.outputs.identity_sha256 }}
      trivy-scan-evidence-sha256: ${{ steps.trivy.outputs.evidence_sha256 }}
      trivy-scan-finished-epoch: ${{ steps.trivy.outputs.scan_finished_epoch }}
